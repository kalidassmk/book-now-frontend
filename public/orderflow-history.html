<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pump History · BookNow</title>
<style>
  :root {
    --bg:#0b0e14; --panel:#141925; --panel2:#1b2130; --border:#232b3d;
    --text:#e6e9f0; --muted:#8a93a6; --green:#16c784; --red:#ea3943;
    --amber:#f0b90b; --blue:#4b9fff; --accent:#f0b90b;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); }
  header { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:14px 24px; border-bottom:1px solid var(--border); background:var(--panel); position:sticky; top:0; z-index:10; }
  header .left { display:flex; align-items:center; gap:16px; }
  header h1 { font-size:17px; margin:0; font-weight:600; }
  header h1 span { color:var(--accent); }
  a.back { color:var(--muted); text-decoration:none; font-size:13px; padding:6px 12px; border:1px solid var(--border); border-radius:8px; }
  a.back:hover { color:var(--text); background:var(--panel2); }
  main { padding:24px; max-width:1500px; margin:0 auto; }
  .note { font-size:12px; color:var(--muted); line-height:1.6; margin:0 0 18px; padding:12px 16px; background:var(--panel); border:1px solid var(--border); border-radius:10px; }
  .controls, .filters { display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; margin-bottom:14px; }
  .filters { padding:12px 16px; background:var(--panel); border:1px solid var(--border); border-radius:10px; margin-bottom:16px; }
  .field { display:flex; flex-direction:column; gap:4px; }
  .field label { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }
  .field input, .field select { background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 10px; font-size:13px; font-family:inherit; }
  .field input:focus, .field select:focus { outline:none; border-color:var(--accent); }
  .filters .field input { width:130px; }
  button.go { background:var(--accent); color:#1a1400; border:none; border-radius:8px; padding:9px 18px; font-weight:700; font-size:13px; cursor:pointer; }
  button.go:hover { filter:brightness(1.08); }
  button.go:disabled { opacity:.5; cursor:not-allowed; }
  button.ghost { background:var(--panel2); color:var(--text); border:1px solid var(--border); }
  .summary { display:flex; flex-wrap:wrap; gap:18px; margin-bottom:14px; font-size:13px; }
  .summary .chip { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:8px 14px; }
  .summary .chip b { color:var(--text); font-variant-numeric:tabular-nums; }
  .summary .chip .k { color:var(--muted); margin-right:8px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { position:sticky; top:56px; background:var(--panel2); color:var(--muted); text-align:right; padding:9px 12px; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; white-space:nowrap; }
  thead th:nth-child(1), thead th:nth-child(2), thead th:nth-child(3), tbody td:nth-child(1), tbody td:nth-child(2), tbody td:nth-child(3) { text-align:left; }
  thead th.sorted::after { content:" ▾"; color:var(--accent); }
  thead th.sorted.asc::after { content:" ▴"; }
  tbody td { text-align:right; padding:8px 12px; border-bottom:1px solid var(--border); font-variant-numeric:tabular-nums; white-space:nowrap; }
  tbody tr:hover { background:var(--panel); }
  .pos { color:var(--green); } .neg { color:var(--red); }
  .src { font-size:11px; padding:2px 8px; border-radius:6px; background:var(--panel2); border:1px solid var(--border); color:var(--muted); }
  .sym { font-weight:700; }
  .sym a { color:var(--blue); text-decoration:none; }
  .sym a:hover { text-decoration:underline; }
  .empty { text-align:center; color:var(--muted); padding:40px; }
  .err { color:#ffb3b8; }
</style>
</head>
<body>
<header>
  <div class="left">
    <h1 id="title">Pump <span>History</span></h1>
    <span id="loading" style="font-size:12px;color:var(--muted);"></span>
  </div>
  <div style="display:flex; gap:10px;">
    <a class="back" id="radarLink" href="/pump-radar.html">Live Radar →</a>
    <a class="back" href="/">← Dashboard</a>
  </div>
</header>
<main>
  <p class="note" id="note"></p>

  <div class="controls">
    <div class="field"><label>From</label><input id="from" type="date" /></div>
    <div class="field"><label>To</label><input id="to" type="date" /></div>
    <div class="field"><label>Symbol (optional)</label><input id="sym" placeholder="e.g. PEPEUSDT" style="width:150px; text-transform:uppercase;" /></div>
    <button class="go" id="load">Load history</button>
    <button class="go ghost" id="refreshPrice" title="Re-fetch current Binance price + recompute vs-signal difference">↻ Live price</button>
    <button class="go ghost" id="enrich" title="Fill buy/sell volume from Binance klines (browser)">Enrich buy/sell vol</button>
  </div>

  <div class="filters">
    <div class="field"><label>Source</label><select id="fSource"><option value="">All sources</option></select></div>
    <div class="field"><label>Min signal price</label><input id="fPrice" type="number" step="any" placeholder="any" /></div>
    <div class="field"><label>Min % increase</label><input id="fChg" type="number" step="any" placeholder="any" /></div>
    <div class="field"><label>Min buy vol (USDT)</label><input id="fBuy" type="number" step="any" placeholder="enrich first" /></div>
    <div class="field"><label>Min sell vol (USDT)</label><input id="fSell" type="number" step="any" placeholder="enrich first" /></div>
    <div class="field"><label>&nbsp;</label><button class="go ghost" id="apply">Apply filters</button></div>
  </div>

  <div class="summary" id="summary"></div>
  <table>
    <thead>
      <tr>
        <th data-k="ts">Date / Time</th>
        <th data-k="symbol">Symbol</th>
        <th data-k="source">Source</th>
        <th data-k="price">Signal Price</th>
        <th data-k="now_price">Now Price</th>
        <th data-k="diff_pct">vs Signal</th>
        <th data-k="chg_pct">% Change</th>
        <th data-k="vol_surge">Vol Surge</th>
        <th data-k="buy_vol">Buy Vol (USDT)</th>
        <th data-k="sell_vol">Sell Vol (USDT)</th>
        <th data-k="score">Score</th>
      </tr>
    </thead>
    <tbody id="rows"><tr><td class="empty" colspan="11">Date range குடுத்து “Load history” அழுத்துங்க.</td></tr></tbody>
  </table>
</main>

<script>
  // ── per-page config (pump vs orderflow) ────────────────────────────────
  const SOURCE = 'orderflow';
  const PAGE = {
    buysignals: {
      title: 'Buy Signals <span>History</span>', radar: '/coin.html', radarLabel: 'Coin',
      note: '📜 <b>Top Buy Signals history</b> — coin.html-ல காட்டப்படும் “🎯 Top 5 Latest Buy Signals” strong-bucket signals மட்டும் (Instant-Pump, PumpRider STRONG/NORMAL, Early-Pump ≥80, VSP BIG_PUMP, LMC EXPLOSIVE_PUMP, CCP CALM_REVERSAL_UP). கடந்த 90 நாட்கள். ஒவ்வொரு signal-க்கும் <b>signal price</b>, <b>price % increase</b>, <b>volume surge</b> காட்டும். <b>Buy/Sell volume</b> அந்த நிமிட Binance candle-ல இருந்து “Enrich” button அழுத்தினா browser-ல load ஆகும். Date / price / %-increase / buy / sell volume வைச்சு filter பண்ணலாம்.',
    },
    pump: {
      title: 'Pump <span>History</span>', radar: '/pump-radar.html', radarLabel: 'Pump Radar',
      note: '📜 <b>Pump Radar history</b> — pump-radar.html page-ல <b>ARMED + SIGNAL</b> நிலைக்கு வந்த coins மட்டும் store ஆகும். கடந்த 90 நாட்கள். ஒவ்வொரு signal-க்கும் <b>signal price</b>, <b>price % increase</b>, <b>volume surge</b> காட்டும். <b>Buy/Sell volume</b> அந்த நிமிட Binance candle-ல இருந்து “Enrich” button அழுத்தினா browser-ல load ஆகும். Date / price / %-increase / buy / sell volume வைச்சு filter பண்ணலாம்.',
    },
    orderflow: {
      title: 'Order Flow <span>History</span>', radar: '/orderflow-radar.html', radarLabel: 'Order Flow Radar',
      note: '📜 <b>Order Flow Radar history</b> — orderflow-radar.html page-ல <b>BUY + CONFIRM</b> candidate நிலைக்கு வந்த coins மட்டும் store ஆகும். கடந்த 90 நாட்கள். ஒவ்வொரு signal-க்கும் <b>signal price</b>, <b>price % increase</b>, <b>volume surge</b>, <b>buy/sell volume</b> காட்டும். Capture-ல buy/sell volume நேரடியா இருக்கும்.',
    },
  };
  const CFG = PAGE[SOURCE];
  const TITLE_WORD = SOURCE === 'buysignals' ? 'Buy Signals' : SOURCE === 'pump' ? 'Pump' : 'Order Flow';
  document.title = TITLE_WORD + ' History · BookNow';
  document.getElementById('title').innerHTML = CFG.title;
  document.getElementById('radarLink').href = CFG.radar;
  document.getElementById('radarLink').textContent = 'Live Radar →';
  const NOTE_LIVE = '<br>💹 <b>Now Price</b> + <b>vs Signal</b>: signal price-க்கும் இப்போதைய Binance live price-க்கும் உள்ள % difference. <b>✅</b> = prediction வேலை செஞ்சது (signal-க்கு அப்புறம் விலை மேல போச்சு), <b>❌</b> = போகல. மேல உள்ள “↻ Live price” button அழுத்தினா மறுபடி புதுப்பிக்கும். (இது signal நேரத்திலிருந்து இதுவரைக்கும் உள்ள move — short-term entry-க்கு அப்புறம் என்ன ஆச்சுனு காட்டுது.)';
  const NOTE_DISCLAIMER = '<br><i>இது objective technical data மட்டும் — investment advice இல்ல. நான் licensed financial advisor இல்ல.</i>';
  document.getElementById('note').innerHTML = CFG.note + NOTE_LIVE + NOTE_DISCLAIMER;

  const $ = id => document.getElementById(id);
  const fmtUsd = v => v == null ? '–' : (v >= 1e9 ? (v/1e9).toFixed(2)+'B' : v >= 1e6 ? (v/1e6).toFixed(2)+'M' : v >= 1e3 ? (v/1e3).toFixed(1)+'K' : (+v).toFixed(0));
  const fmtPrice = v => v == null ? '–' : (v >= 1 ? (+v).toFixed(4) : (+v).toPrecision(5));
  const pad = n => String(n).padStart(2, '0');
  const fmtTime = ts => { const d = new Date(ts); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; };
  const SRC_LABEL = { pump_rider:'PumpRider', lmc:'LMC', instant_pump:'Instant', vsp:'VSP', ccp:'CCP', early_pump:'EarlyPump', pump_radar:'Radar', fast_scalper:'FastScalp', virtual_scalper:'VirtScalp', orderflow_radar:'Radar' };
  // For radar pages the source is always "Radar"; the useful info is the status
  // label (ARMED/SIGNAL/BUY/CONFIRM). For buysignals show the detector name.
  function srcCell(r) {
    if (r.source === 'pump_radar' || r.source === 'orderflow_radar')
      return (r.label || 'Radar').toUpperCase();
    return SRC_LABEL[r.source] || r.source;
  }
  // group rows by what the Source column displays (detector name / radar status)
  const sourceKey = r => srcCell(r) || '';
  // rebuild the Source dropdown from the sources actually present in the data
  function populateSourceFilter() {
    const sel = $('fSource');
    const cur = sel.value;
    const keys = [...new Set(ALL.map(sourceKey))].filter(Boolean).sort();
    sel.innerHTML = '<option value="">All sources</option>' +
      keys.map(k => `<option value="${k}">${k}</option>`).join('');
    sel.value = keys.includes(cur) ? cur : '';
  }
  // "vs Signal" cell — % move from signal price to current price + ✅/❌
  function diffCell(r) {
    if (r.diff_pct == null) return '<span style="color:var(--muted)">—</span>';
    const up = r.diff_pct >= 0;
    return `${up ? '✅' : '❌'} ${up ? '+' : ''}${r.diff_pct.toFixed(2)}%`;
  }

  // ── live current price (one Binance call returns every symbol) ──────────
  const nowPx = { ts: 0, map: null };
  async function fetchNowPrices() {
    try {
      const resp = await fetch('https://api.binance.com/api/v3/ticker/price');
      if (!resp.ok) return null;
      const arr = await resp.json();
      const map = new Map();
      for (const t of arr) map.set(t.symbol, +t.price);
      nowPx.ts = Date.now(); nowPx.map = map;
      return map;
    } catch (_) { return null; }
  }
  async function fillNowPrices(force) {
    let map = nowPx.map;
    if (force || !map || Date.now() - nowPx.ts > 20000) map = await fetchNowPrices();
    if (!map) return;
    for (const r of ALL) {
      const np = map.get(r.symbol);
      if (np == null) continue;
      r.now_price = np;
      if (r.price != null && r.price > 0) r.diff_pct = (np - r.price) / r.price * 100;
    }
  }

  (function initDates() {
    $('to').value = new Date().toISOString().slice(0, 10);
    $('from').value = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
  })();

  let ALL = [];
  let sortKey = 'ts', sortAsc = false;

  async function load() {
    const params = new URLSearchParams({ source: SOURCE, from: $('from').value, to: $('to').value, limit: '3000' });
    const sym = $('sym').value.trim().toUpperCase();
    if (sym) params.set('symbol', sym);
    const fp = parseFloat($('fPrice').value); if (!isNaN(fp)) params.set('minPrice', fp);
    const fc = parseFloat($('fChg').value);   if (!isNaN(fc)) params.set('minChgPct', fc);
    $('load').disabled = true; $('loading').textContent = 'Loading…';
    $('rows').innerHTML = '<tr><td class="empty" colspan="11">Loading…</td></tr>';
    try {
      const r = await fetch('/api/history/signals?' + params.toString());
      if (!r.ok) throw new Error('server ' + r.status);
      const data = await r.json();
      ALL = data.events || [];
      $('loading').textContent = ALL.length + ' signals · fetching live prices…';
      await fillNowPrices(true);
      populateSourceFilter();
      $('loading').textContent = ALL.length + ' signals';
      render();
    } catch (e) {
      $('rows').innerHTML = `<tr><td class="empty err" colspan="11">${e.message}</td></tr>`;
      $('loading').textContent = ''; $('summary').innerHTML = '';
    } finally { $('load').disabled = false; }
  }

  function filtered() {
    const fb = parseFloat($('fBuy').value);
    const fs = parseFloat($('fSell').value);
    const src = $('fSource').value;
    return ALL.filter(r =>
      (!src || sourceKey(r) === src) &&
      (isNaN(fb) || (r.buy_vol  != null && r.buy_vol  >= fb)) &&
      (isNaN(fs) || (r.sell_vol != null && r.sell_vol >= fs))
    );
  }

  function render() {
    let rows = filtered();
    rows.sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (typeof av === 'string' || typeof bv === 'string')
        return sortAsc ? String(av||'').localeCompare(String(bv||'')) : String(bv||'').localeCompare(String(av||''));
      const d = (av ?? -Infinity) - (bv ?? -Infinity);
      return sortAsc ? d : -d;
    });
    const tb = $('rows');
    if (!rows.length) { tb.innerHTML = '<tr><td class="empty" colspan="11">இந்த filter-க்கு signal இல்ல.</td></tr>'; renderSummary(rows); return; }
    tb.innerHTML = rows.slice(0, 2000).map(r => `
      <tr>
        <td>${fmtTime(r.ts)}</td>
        <td class="sym"><a href="/coin-history.html?sym=${r.symbol}" title="Coin history">${r.symbol||'–'}</a></td>
        <td><span class="src">${srcCell(r)}</span></td>
        <td>${fmtPrice(r.price)}</td>
        <td>${r.now_price==null?'<span style="color:var(--muted)">—</span>':fmtPrice(r.now_price)}</td>
        <td class="${r.diff_pct==null?'':(r.diff_pct>=0?'pos':'neg')}">${diffCell(r)}</td>
        <td class="${(r.chg_pct||0) >= 0 ? 'pos' : 'neg'}">${r.chg_pct==null?'–':(r.chg_pct>=0?'+':'')+r.chg_pct.toFixed(2)+'%'}</td>
        <td>${r.vol_surge==null?'–':r.vol_surge.toFixed(1)+'×'}</td>
        <td class="pos">${r.buy_vol==null?'<span style="color:var(--muted)">—</span>':fmtUsd(r.buy_vol)}</td>
        <td class="neg">${r.sell_vol==null?'<span style="color:var(--muted)">—</span>':fmtUsd(r.sell_vol)}</td>
        <td>${r.score==null?'–':r.score.toFixed(0)}</td>
      </tr>`).join('');
    renderSummary(rows);
  }

  function renderSummary(rows) {
    const enriched = rows.filter(r => r.buy_vol != null).length;
    const syms = new Set(rows.map(r => r.symbol)).size;
    const avgChg = rows.filter(r => r.chg_pct != null);
    const m = avgChg.length ? avgChg.reduce((s, r) => s + r.chg_pct, 0) / avgChg.length : 0;
    // prediction outcome — signal price vs current live price
    const withNow = rows.filter(r => r.diff_pct != null);
    const won = withNow.filter(r => r.diff_pct > 0).length;
    const winRate = withNow.length ? won / withNow.length * 100 : 0;
    const avgDiff = withNow.length ? withNow.reduce((s, r) => s + r.diff_pct, 0) / withNow.length : 0;
    $('summary').innerHTML = `
      <div class="chip"><span class="k">Signals</span><b>${rows.length}</b></div>
      <div class="chip"><span class="k">Coins</span><b>${syms}</b></div>
      <div class="chip"><span class="k">Avg % move</span><b class="${m>=0?'pos':'neg'}">${m>=0?'+':''}${m.toFixed(2)}%</b></div>
      <div class="chip"><span class="k">Prediction worked</span><b class="${winRate>=50?'pos':'neg'}">${withNow.length?`${won}/${withNow.length} (${winRate.toFixed(0)}%)`:'–'}</b></div>
      <div class="chip"><span class="k">Avg since-signal</span><b class="${avgDiff>=0?'pos':'neg'}">${withNow.length?`${avgDiff>=0?'+':''}${avgDiff.toFixed(2)}%`:'–'}</b></div>
      <div class="chip"><span class="k">Buy/sell vol filled</span><b>${enriched}/${rows.length}</b></div>`;
  }

  // ── enrichment: fetch the 1m Binance candle covering each signal ts ─────
  const klineCache = new Map();   // key sym|minute → {buy,sell}
  async function enrichOne(r) {
    if (r.buy_vol != null || !r.symbol || !r.ts) return;
    const minute = Math.floor(r.ts / 60000) * 60000;
    const cacheKey = r.symbol + '|' + minute;
    if (klineCache.has(cacheKey)) { Object.assign(r, klineCache.get(cacheKey)); return; }
    try {
      const url = `https://api.binance.com/api/v3/klines?symbol=${r.symbol}&interval=1m&startTime=${minute}&limit=1`;
      const resp = await fetch(url);
      if (!resp.ok) return;
      const ks = await resp.json();
      if (!ks.length) return;
      const k = ks[0];
      const totalQuote = +k[7], buyQuote = +k[10];
      const val = { buy_vol: buyQuote, sell_vol: totalQuote - buyQuote };
      klineCache.set(cacheKey, val);
      Object.assign(r, val);
    } catch (_) {}
  }

  async function enrichAll() {
    const todo = filtered().filter(r => r.buy_vol == null && r.symbol).slice(0, 600);
    if (!todo.length) { $('loading').textContent = 'எல்லாம் already filled'; return; }
    $('enrich').disabled = true;
    let done = 0;
    const CONC = 6;
    const queue = [...todo];
    async function worker() {
      while (queue.length) {
        await enrichOne(queue.shift());
        done++;
        if (done % 10 === 0) $('loading').textContent = `Enriching ${done}/${todo.length}…`;
      }
    }
    await Promise.all(Array.from({ length: CONC }, worker));
    $('loading').textContent = ALL.length + ' signals · vol filled';
    $('enrich').disabled = false;
    render();
  }

  document.querySelectorAll('thead th').forEach(th => th.addEventListener('click', () => {
    const k = th.dataset.k;
    if (sortKey === k) sortAsc = !sortAsc; else { sortKey = k; sortAsc = false; }
    document.querySelectorAll('thead th').forEach(x => x.classList.remove('sorted', 'asc'));
    th.classList.add('sorted'); if (sortAsc) th.classList.add('asc');
    render();
  }));

  $('load').addEventListener('click', load);
  $('apply').addEventListener('click', render);
  $('fSource').addEventListener('change', render);
  $('enrich').addEventListener('click', enrichAll);
  $('refreshPrice').addEventListener('click', async () => {
    if (!ALL.length) return;
    $('refreshPrice').disabled = true; $('loading').textContent = 'Refreshing live prices…';
    await fillNowPrices(true);
    $('loading').textContent = ALL.length + ' signals';
    $('refreshPrice').disabled = false; render();
  });
  $('sym').addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
  [ 'fBuy', 'fSell' ].forEach(id => $(id).addEventListener('keydown', e => { if (e.key === 'Enter') render(); }));
  (function preSym() {
    const s = new URLSearchParams(location.search).get('sym');
    if (s) $('sym').value = s.trim().toUpperCase();
  })();
  load();
</script>
</body>
</html>
