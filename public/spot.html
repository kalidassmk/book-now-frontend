<!DOCTYPE html>
<html lang="en">
<head>
<!--
  public/spot.html
  ──────────────────────────────────────────────────────────────────────────
  Binance Spot Movers — operator-facing market scanner.

  iter 26 (2026-05-13): the page now polls /api/spot-tickers on the
  Book-Now backend instead of opening a direct WebSocket to Binance.
  Some browsers / ISPs (especially in India) block stream.binance.com,
  so iter 25's pure browser-side WebSocket showed an empty table for
  the operator. The backend's binance-worker already has a healthy
  WebSocket subscription to !miniTicker@arr and exposes the cache
  through /api/spot-tickers?window=24h. 1h/4h are fetched on the
  backend via the rolling-window REST endpoint.

  Polling cadence: every 2s. The backend cache is updated by WebSocket
  in near-real-time so 2s polling is plenty fresh for an operator UI.
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spot Movers — Book-Now</title>
<style>
  :root {
    --bg: #0c1116; --panel: #141b24; --line: #1f2933;
    --accent: #29b6f6; --good: #2ecc71; --bad: #e74c3c; --warn: #f1c40f;
    --text: #e6edf3; --muted: #8b949e;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font: 13px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 18px; }
  h1 { margin: 0 0 6px; font-size: 22px; }
  .sub { color: var(--muted); margin-bottom: 18px; font-size: 13px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); animation: pulse 1.4s ease-in-out infinite; }
  .live-dot.off { background: var(--bad); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.85);} }
  .topnav { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .topnav a { display: inline-block; padding: 6px 14px; border-radius: 6px; background: var(--panel); border: 1px solid var(--line); color: var(--muted); text-decoration: none; font-size: 12px; font-weight: 600; }
  .topnav a.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .topnav a:not(.active):hover { color: var(--text); border-color: var(--muted); }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .controls label { color: var(--muted); font-size: 12px; }
  .controls select, .controls input {
    background: var(--panel); color: var(--text); border: 1px solid var(--line);
    border-radius: 4px; padding: 6px 12px; font-family: inherit; font-size: 13px;
  }
  .controls select { cursor: pointer; }
  .counter { color: var(--muted); font-size: 11px; margin-left: auto; font-variant-numeric: tabular-nums; }
  /* iter 29: table sizes to its content (was width:100% which spread 6
     columns across the full viewport and left huge empty gaps). The
     wrapping .scroll div still allows horizontal scroll on narrow
     screens. Padding tightened slightly so rows are denser. */
  table {
    width: max-content;
    max-width: 100%;
    border-collapse: collapse;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  th, td { padding: 7px 18px; text-align: left; border-bottom: 1px solid var(--line); font-size: 13px; white-space: nowrap; }
  th { background: #1a232e; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.4px; position: sticky; top: 0; z-index: 1; user-select: none; cursor: pointer; }
  th:hover { color: var(--text); }
  th.sorted::after { content: " ↓"; color: var(--accent); }
  th.sorted.asc::after { content: " ↑"; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(41,182,246,0.04); }
  /* iter 28: apply .num to BOTH th and td so headers right-align with the
     numeric data underneath. Was td.num only, so headers stayed left-
     aligned and didn't line up with the values. */
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  td.symbol { font-weight: 600; }
  td.symbol .ticker { color: var(--text); }
  td.symbol .quote { color: var(--muted); font-size: 11px; font-weight: 400; }
  .pos { color: var(--good); }
  .neg { color: var(--bad); }
  .mute { color: var(--muted); }
  .change-cell { font-weight: 600; }
  .empty { padding: 32px; text-align: center; color: var(--muted); }
  .scroll { overflow-x: auto; }
</style>
</head>
<body>

<nav class="topnav">
  <a href="/">📊 Monitor</a>
  <a href="/scanner">🏠 Scanner</a>
  <a href="/metrics.html">📈 Metrics</a>
  <a href="/spot.html" class="active">📋 Spot</a>
</nav>

<h1>Spot Movers</h1>
<div class="sub">
  <span class="live-dot" id="liveDot"></span>
  <span id="liveLabel">Connecting…</span>
  <span class="counter" id="counter">—</span>
</div>

<div class="controls">
  <label>Timeframe</label>
  <select id="timeframe">
    <option value="24h" selected>24h</option>
    <option value="1h">1h</option>
    <option value="4h">4h</option>
  </select>

  <label>Min 24h volume (M USDT)</label>
  <input id="minVol" type="number" min="0" step="0.5" value="2" style="width:80px" />

  <label>Show</label>
  <select id="topN">
    <option value="50">Top 50</option>
    <option value="100" selected>Top 100</option>
    <option value="200">Top 200</option>
    <option value="0">All</option>
  </select>

  <label>Filter</label>
  <input id="filter" type="text" placeholder="e.g. BTC, BNB" style="width:120px" />
</div>

<div class="scroll">
  <table>
    <thead>
      <tr>
        <th data-sort="symbol">Symbol</th>
        <th class="num" data-sort="price">Price (USDT)</th>
        <th class="num sorted" data-sort="change">Change %</th>
        <th class="num" data-sort="high">High (24h)</th>
        <th class="num" data-sort="low">Low (24h)</th>
        <th class="num" data-sort="volume">Volume (24h)</th>
      </tr>
    </thead>
    <tbody id="rows"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
  </table>
</div>

<script>
// State
let timeframe = "24h";
let topN      = 100;
let minVolMUsdt = 2;
let filterTerm  = "";
let sortKey   = "change";
let sortAsc   = false;
let tickers   = [];     // last snapshot from backend
let pollTimer = null;
let lastSuccessTs = 0;

function setStatus(state, label) {
    const dot = document.getElementById("liveDot");
    dot.classList.toggle("off", state !== "ok");
    document.getElementById("liveLabel").textContent = label;
}

async function pollOnce() {
    try {
        const resp = await fetch(`/api/spot-tickers?window=${timeframe}`);
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();
        tickers = data.tickers || [];
        lastSuccessTs = data.ts || Date.now();
        const ageSec = (Date.now() - lastSuccessTs) / 1000;
        setStatus("ok", `Live · ${timeframe} · ${tickers.length} symbols · refreshed ${ageSec.toFixed(0)}s ago`);
        render();
    } catch (e) {
        console.warn("poll failed:", e);
        setStatus("err", "Backend fetch failed — retrying…");
    }
}

function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollOnce();
    // 24h is updated by backend WS in near-real-time; poll every 2s.
    // 1h/4h are backend REST calls; poll every 5s to be polite.
    const interval = (timeframe === "24h") ? 2000 : 5000;
    pollTimer = setInterval(pollOnce, interval);
}

function fmtPrice(p) {
    if (p == null || isNaN(p)) return "—";
    if (p >= 100)    return p.toFixed(2);
    if (p >= 1)      return p.toFixed(4);
    if (p >= 0.01)   return p.toFixed(6);
    return p.toPrecision(4);
}

function fmtPct(v) {
    if (v == null || isNaN(v)) return "—";
    const sign = v >= 0 ? "+" : "";
    return `${sign}${v.toFixed(2)}%`;
}

function fmtVolume(v) {
    if (v == null || isNaN(v)) return "—";
    if (v >= 1e9) return `${(v/1e9).toFixed(2)}B`;
    if (v >= 1e6) return `${(v/1e6).toFixed(2)}M`;
    if (v >= 1e3) return `${(v/1e3).toFixed(1)}K`;
    return v.toFixed(0);
}

function render() {
    const minVolUsdt = minVolMUsdt * 1e6;
    const filter = filterTerm.trim().toUpperCase();

    // Filter for leveraged-token noise + volume floor + name match
    let rows = tickers.filter(t => {
        if (!t.symbol || !t.symbol.endsWith("USDT")) return false;
        const base = t.symbol.replace("USDT", "");
        if (/UP$|DOWN$|BULL$|BEAR$|3L$|3S$/.test(base)) return false;
        if (t.volume == null || t.volume < minVolUsdt) return false;
        if (filter && !t.symbol.includes(filter)) return false;
        return true;
    });

    // Sort
    rows.sort((a, b) => {
        let av, bv;
        if (sortKey === "symbol") { av = a.symbol; bv = b.symbol; }
        else if (sortKey === "price") { av = a.price; bv = b.price; }
        else if (sortKey === "change") { av = a.change; bv = b.change; }
        else if (sortKey === "high") { av = a.high; bv = b.high; }
        else if (sortKey === "low") { av = a.low; bv = b.low; }
        else if (sortKey === "volume") { av = a.volume; bv = b.volume; }
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        if (typeof av === "string") return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
        return sortAsc ? av - bv : bv - av;
    });

    if (topN > 0) rows = rows.slice(0, topN);

    const tbody = document.getElementById("rows");
    if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No symbols match (or waiting for data)…</td></tr>';
    } else {
        tbody.innerHTML = rows.map(t => {
            const change = t.change;
            const changeClass = change == null ? "mute" : (change >= 0 ? "pos" : "neg");
            const base = t.symbol.replace("USDT", "");
            return `<tr>
                <td class="symbol">
                  <span class="ticker">${base}</span>
                  <span class="quote">/USDT</span>
                </td>
                <td class="num">${fmtPrice(t.price)}</td>
                <td class="num change-cell ${changeClass}">${fmtPct(change)}</td>
                <td class="num mute">${fmtPrice(t.high)}</td>
                <td class="num mute">${fmtPrice(t.low)}</td>
                <td class="num mute">${fmtVolume(t.volume)}</td>
            </tr>`;
        }).join("");
    }
    document.getElementById("counter").textContent =
        `${rows.length} shown · ${tickers.length} total · ${timeframe}`;
}

// Wire up controls
document.getElementById("timeframe").addEventListener("change", (e) => {
    timeframe = e.target.value;
    startPolling();  // re-poll immediately on the new window
});

document.getElementById("topN").addEventListener("change", (e) => {
    topN = parseInt(e.target.value, 10);
    render();
});
document.getElementById("minVol").addEventListener("input", (e) => {
    minVolMUsdt = parseFloat(e.target.value) || 0;
    render();
});
document.getElementById("filter").addEventListener("input", (e) => {
    filterTerm = e.target.value;
    render();
});

document.querySelectorAll("th[data-sort]").forEach(th => {
    th.addEventListener("click", () => {
        const key = th.getAttribute("data-sort");
        if (sortKey === key) sortAsc = !sortAsc;
        else { sortKey = key; sortAsc = false; }
        document.querySelectorAll("th[data-sort]").forEach(h => h.classList.remove("sorted", "asc"));
        th.classList.add("sorted");
        if (sortAsc) th.classList.add("asc");
        render();
    });
});

startPolling();
</script>

</body>
</html>
