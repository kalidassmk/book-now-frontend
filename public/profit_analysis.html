<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    public/profit_analysis.html — Profit Watch (v2 redesign).

    Live coins currently above the +$0.20 profit threshold (vs base
    price), ranked by signal strength. Replaces the previous "Success
    Intelligence Radar" 2-col card grid with a dense, ranked-row list
    + tier classification + click-to-expand trajectory chart.

    Data sources (unchanged from v1):
      data.fullTimeline    → ANALYSIS_020_TIMELINE Redis hash
                             { symbol → [snapshots] }
      data.profitTimeline  → PROFIT_REACHED_020 Redis hash
                             { symbol → {basePrice, currentPrice, profit, …} }
      data.priceHash       → CURRENT_PRICE hash
                             { symbol → {price, …} }
  -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profit Watch — BookNow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --pw-panel:    #131a2c;
      --pw-panel-2:  #1a2238;
      --pw-border-2: #283b5d;
      --pw-text-2:   #b8c2d6;
      --pw-green-2:  #34d399;
      --pw-red-2:    #f87171;
      --pw-radius-sm: 10px;
    }
    body { font-family: 'Inter', system-ui, sans-serif; margin: 0; }
    .pw-page { max-width: 1500px; margin: 0 auto; padding: 28px 32px 60px; color: var(--text); }

    /* ── Topbar ────────────────────────────────────────────────────────── */
    .pw-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .pw-topbar h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
    .pw-topbar .sub { color: var(--dim); font-size: 12px; margin-top: 2px; }
    .pw-topbar .right { display: flex; gap: 16px; align-items: center; font-size: 12px; }
    .pw-topbar a { color: var(--blue); text-decoration: none; }
    .pw-topbar a:hover { text-decoration: underline; }
    .pw-live { display: inline-flex; align-items: center; gap: 6px; color: var(--green); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px; }
    .pw-live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pw-pulse 1.5s ease-in-out infinite; }
    .pw-live.off { color: var(--dim); }
    .pw-live.off::before { background: var(--dim); animation: none; }
    @keyframes pw-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Top summary bar ───────────────────────────────────────────────── */
    .pw-summary {
      background: linear-gradient(135deg, var(--pw-panel) 0%, var(--pw-panel-2) 100%);
      border: 1px solid var(--pw-border-2);
      border-radius: var(--radius);
      padding: 22px 28px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 32px;
      align-items: center;
    }
    .pw-summary .total { display: flex; align-items: center; gap: 16px; }
    .pw-summary .total-num { font-family: var(--mono); font-size: 36px; font-weight: 800; color: var(--text); line-height: 1; }
    .pw-summary .total-lbl { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; line-height: 1.3; }
    .pw-tiers { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
    .pw-tier-stat { display: flex; align-items: baseline; gap: 6px; }
    .pw-tier-stat .icon { font-size: 16px; }
    .pw-tier-stat .num { font-family: var(--mono); font-size: 20px; font-weight: 700; }
    .pw-tier-stat .lbl { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
    .pw-tier-stat.hot  .num { color: #fb923c; }
    .pw-tier-stat.watch .num { color: #fbbf24; }
    .pw-tier-stat.fresh .num { color: var(--pw-green-2); }
    .pw-tier-stat.cool  .num { color: var(--pw-red-2); }
    .pw-tier-stat.stale .num { color: var(--dim); }
    .pw-summary .right { margin-left: auto; text-align: right; }
    .pw-summary .right .v { font-family: var(--mono); font-size: 14px; font-weight: 700; }
    .pw-summary .right .l { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
    .pw-summary .strongest { color: var(--pw-green-2); }

    /* ── Filter chips ──────────────────────────────────────────────────── */
    .pw-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .pw-chip {
      background: var(--pw-panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--pw-text-2);
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .pw-chip:hover { border-color: var(--pw-border-2); color: var(--text); }
    .pw-chip.active { background: rgba(59,130,246,0.12); color: var(--blue); border-color: var(--blue); }
    .pw-chip .n { color: var(--dim); margin-left: 4px; font-family: var(--mono); }
    .pw-chip.active .n { color: var(--blue); }

    /* ── Rows ──────────────────────────────────────────────────────────── */
    .pw-rows { display: flex; flex-direction: column; gap: 6px; }
    .pw-empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--dim);
      font-size: 13px;
      background: var(--pw-panel);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
    .pw-row {
      background: var(--pw-panel);
      border: 1px solid var(--border);
      border-radius: var(--pw-radius-sm);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .pw-row:hover { border-color: var(--pw-border-2); }
    .pw-row.expanded { border-color: var(--blue); }

    .pw-row-main {
      display: grid;
      grid-template-columns:
        28px            /* tier icon */
        1.5fr           /* symbol + meta */
        90px            /* % from base */
        90px            /* sparkline */
        1.5fr           /* sequence info */
        80px            /* time above */
        100px           /* match score */
        20px;           /* expand chevron */
      gap: 14px;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
    }
    .pw-tier-icon { font-size: 18px; text-align: center; }
    .pw-row-sym { font-size: 14px; font-weight: 700; letter-spacing: 0.02em; }
    .pw-row-tier-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; font-weight: 700; }
    .pw-row-tier-label.hot  { color: #fb923c; }
    .pw-row-tier-label.watch { color: #fbbf24; }
    .pw-row-tier-label.fresh { color: var(--pw-green-2); }
    .pw-row-tier-label.cool  { color: var(--pw-red-2); }
    .pw-row-tier-label.stale { color: var(--dim); }
    .pw-row-pct { font-family: var(--mono); font-size: 18px; font-weight: 700; text-align: right; }
    .pw-row-pct.green { color: var(--pw-green-2); }
    .pw-row-pct.red   { color: var(--pw-red-2); }
    .pw-spark { width: 90px; height: 28px; }
    .pw-row-seq { font-size: 11px; }
    .pw-row-seq .seq-strong { font-weight: 700; font-family: var(--mono); }
    .pw-row-seq .seq-strong.green { color: var(--pw-green-2); }
    .pw-row-seq .seq-strong.red   { color: var(--pw-red-2); }
    .pw-row-seq .seq-meta { font-size: 10px; color: var(--dim); margin-top: 2px; }
    .pw-row-time { font-family: var(--mono); font-size: 12px; color: var(--pw-text-2); text-align: right; }
    .pw-row-match { font-family: var(--mono); font-size: 12px; text-align: right; color: var(--dim); }
    .pw-row-chevron { color: var(--dim); transition: transform 0.15s; user-select: none; }
    .pw-row.expanded .pw-row-chevron { transform: rotate(90deg); color: var(--blue); }

    /* ── Expanded detail ───────────────────────────────────────────────── */
    .pw-row-detail {
      border-top: 1px solid var(--border);
      padding: 18px 16px;
      display: none;
      grid-template-columns: 2fr 1fr;
      gap: 18px;
      background: rgba(255,255,255,0.01);
    }
    .pw-row.expanded .pw-row-detail { display: grid; }
    .pw-detail-chart { height: 240px; position: relative; }
    .pw-detail-chart canvas { width: 100% !important; height: 100% !important; }
    .pw-detail-info h4 { font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 10px; }
    .pw-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
    .pw-info-item .l { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
    .pw-info-item .v { font-family: var(--mono); font-size: 13px; color: var(--text); margin-top: 2px; }
    .pw-info-item .v.green { color: var(--pw-green-2); }
    .pw-info-item .v.red   { color: var(--pw-red-2); }
    .pw-seq-bars { display: flex; gap: 2px; margin-top: 8px; align-items: end; height: 40px; }
    .pw-seq-bars .bar { flex: 1; background: var(--blue); opacity: 0.5; border-radius: 2px 2px 0 0; min-height: 2px; }
    .pw-seq-bars .bar.green { background: var(--green); opacity: 0.8; }
    .pw-seq-bars .bar.red   { background: var(--red); opacity: 0.8; }

    /* ── Last-update pill ──────────────────────────────────────────────── */
    .pw-updated { font-family: var(--mono); font-size: 11px; color: var(--dim); }
  </style>
</head>
<body>
<div class="pw-page">

  <!-- Top bar -->
  <div class="pw-topbar">
    <div>
      <h1>Profit Watch</h1>
      <div class="sub">Live coins above the +$0.20 profit threshold — ranked by signal strength</div>
    </div>
    <div class="right">
      <span class="pw-updated" id="pw-updated">—</span>
      <span id="pw-live" class="pw-live off">Connecting…</span>
      <a href="/">← Scanner</a>
      <a href="/intelligence_hub.html">Intel Hub</a>
    </div>
  </div>

  <!-- Top summary bar -->
  <div class="pw-summary">
    <div class="total">
      <div>
        <div class="total-num" id="pw-total">0</div>
      </div>
      <div>
        <div class="total-lbl">Coins<br/>above target</div>
      </div>
    </div>
    <div class="pw-tiers" id="pw-tiers">
      <div class="pw-tier-stat hot"><span class="icon">🔥</span><span class="num" id="pw-n-hot">0</span><span class="lbl">Hot</span></div>
      <div class="pw-tier-stat watch"><span class="icon">👀</span><span class="num" id="pw-n-watch">0</span><span class="lbl">Watch</span></div>
      <div class="pw-tier-stat fresh"><span class="icon">🟢</span><span class="num" id="pw-n-fresh">0</span><span class="lbl">Fresh</span></div>
      <div class="pw-tier-stat cool"><span class="icon">⚠</span><span class="num" id="pw-n-cool">0</span><span class="lbl">Cooling</span></div>
      <div class="pw-tier-stat stale"><span class="icon">❄</span><span class="num" id="pw-n-stale">0</span><span class="lbl">Stale</span></div>
      <div class="right">
        <div class="v" id="pw-avg-gain">—</div>
        <div class="l">Avg gain from base</div>
      </div>
      <div class="right">
        <div class="v strongest" id="pw-strongest">—</div>
        <div class="l">Strongest</div>
      </div>
    </div>
  </div>

  <!-- Filter chips -->
  <div class="pw-chips" id="pw-chips">
    <span class="pw-chip active" data-filter="all">All <span class="n">0</span></span>
    <span class="pw-chip" data-filter="HOT">🔥 HOT <span class="n">0</span></span>
    <span class="pw-chip" data-filter="WATCH">👀 WATCH <span class="n">0</span></span>
    <span class="pw-chip" data-filter="FRESH">🟢 FRESH <span class="n">0</span></span>
    <span class="pw-chip" data-filter="COOLING">⚠ COOLING <span class="n">0</span></span>
    <span class="pw-chip" data-filter="STALE">❄ STALE <span class="n">0</span></span>
  </div>

  <!-- Ranked rows -->
  <div id="pw-rows" class="pw-rows">
    <div class="pw-empty">Loading…</div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ── State ─────────────────────────────────────────────────────────────
  let activeFilter = 'all';
  let lastTimeline = {};   // symbol → [snapshots]
  let lastBase     = {};   // symbol → basePrice
  let lastPrice    = {};   // symbol → currentPrice
  const expandedSymbols = new Set();
  const charts = {};       // symbol → Chart instance (only for expanded rows)

  // ── Helpers ──────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const fmtPct = (n, decimals = 2) => (n == null || isNaN(n))
      ? '—' : `${n >= 0 ? '+' : ''}${n.toFixed(decimals)}%`;
  const fmtDur = s => {
      if (s == null || isNaN(s) || s < 0) return '—';
      if (s < 60) return `${Math.round(s)}s`;
      if (s < 3600) return `${Math.floor(s/60)}m ${Math.round(s%60).toString().padStart(2,'0')}s`;
      return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
  };
  const fmtPrice = n => (n == null || isNaN(n)) ? '—'
      : (n < 0.01 ? n.toFixed(8) : n < 1 ? n.toFixed(6) : n.toFixed(4));

  // ── Tier classification ───────────────────────────────────────────────
  // Maps a coin's latest snapshot + duration to one of HOT/WATCH/FRESH/
  // COOLING/STALE plus a numeric sort score (higher = ranked higher).
  function classify(symbol, snaps, basePrice, currPrice, durationSec) {
      const last = snaps[snaps.length - 1] || {};
      const seq = last.sequence_report || {};
      const seqType  = seq.type;
      const volChg   = seq.vol_change || 0;
      const priceImp = seq.price_impact || 0;
      const overheated = !!last.is_overheated;
      const microSig = last.micro_signal;
      const gradualUp = !!last.volume_gradual_inc;
      const gainPct = (basePrice && currPrice) ? ((currPrice / basePrice) - 1) * 100 : 0;

      // Has the coin shown any sign of cooling in the captured window?
      const sawExhaustion = snaps.some(s => s.micro_signal === 'EXHAUSTION_EXIT');

      // STALE — flat for 10+ minutes
      const recent = snaps.slice(-10);
      const recentRange = recent.length > 1
          ? Math.max(...recent.map(s => s.price || 0)) - Math.min(...recent.map(s => s.price || 0))
          : 0;
      const flatPct = basePrice ? (recentRange / basePrice) * 100 : 0;

      // FRESH — under 5 min above threshold
      if (durationSec != null && durationSec < 300) {
          return { tier: 'FRESH', icon: '🟢', label: 'Fresh',
                   score: 60 + Math.min(20, gainPct * 4) };
      }

      // COOLING — bearish sequence with vol drop, OR exhaustion was emitted
      if ((seqType === 'bearish_seq' && volChg <= -10) || sawExhaustion) {
          return { tier: 'COOLING', icon: '⚠', label: 'Cooling',
                   score: 40 - Math.min(15, Math.abs(volChg)) };
      }

      // STALE — flat for 10+ min
      if (durationSec != null && durationSec >= 600 && flatPct < 0.05) {
          return { tier: 'STALE', icon: '❄', label: 'Stale', score: 20 };
      }

      // HOT — bullish sequence + strong volume + not overheated
      if (seqType === 'bullish_seq' && volChg >= 15 && !overheated) {
          return { tier: 'HOT', icon: '🔥', label: 'Hot',
                   score: 100 + Math.min(30, volChg) + Math.min(20, gainPct * 5)
                          - (microSig === 'OVERHEATED_NO_BUY' ? 30 : 0) };
      }

      // WATCH — gradual volume increase or early accumulation
      if (gradualUp || microSig === 'EARLY_ACCUMULATION') {
          return { tier: 'WATCH', icon: '👀', label: 'Watch',
                   score: 80 + Math.min(15, volChg) };
      }

      // Otherwise default to FRESH-ish if positive gain, else WATCH
      return gainPct > 0
          ? { tier: 'FRESH', icon: '🟢', label: 'Fresh', score: 50 + gainPct }
          : { tier: 'WATCH', icon: '👀', label: 'Watch', score: 70 };
  }

  // ── Sparkline ─────────────────────────────────────────────────────────
  function buildSparkline(snaps, color) {
      const points = snaps.slice(-30).map(s => s.price).filter(p => p != null);
      if (points.length < 2) return '';
      const w = 90, h = 28, pad = 2;
      const lo = Math.min(...points), hi = Math.max(...points);
      const range = (hi - lo) || 1;
      const x = i => (i / (points.length - 1)) * (w - pad * 2) + pad;
      const y = v => h - pad - ((v - lo) / range) * (h - pad * 2);
      const d = points.map((v, i) => `${i === 0 ? 'M' : 'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
      return `<svg class="pw-spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <path d="${d}" stroke="${color}" stroke-width="1.5" fill="none"/>
      </svg>`;
  }

  // ── Sequence summary string ───────────────────────────────────────────
  function seqSummary(snap) {
      const seq = (snap || {}).sequence_report || {};
      const t = seq.type;
      const vc = seq.vol_change;
      const pi = seq.price_impact;
      if (t === 'bullish_seq') {
          return {
              line1: `<span class="seq-strong green">3× VOL ↑ ${vc >= 0 ? '+' : ''}${vc?.toFixed(1) ?? '?'}%</span>`,
              line2: `Price impact ${pi >= 0 ? '+' : ''}${pi?.toFixed(2) ?? '?'}%${snap.is_overheated ? ' • overheated' : ''}`,
          };
      }
      if (t === 'bearish_seq') {
          return {
              line1: `<span class="seq-strong red">3× VOL ↓ ${vc?.toFixed(1) ?? '?'}%</span>`,
              line2: `Price impact ${pi >= 0 ? '+' : ''}${pi?.toFixed(2) ?? '?'}%`,
          };
      }
      if (snap?.volume_gradual_inc) {
          return { line1: `<span class="seq-strong green">Gradual ↑</span>`, line2: 'Volume rising steadily' };
      }
      if (snap?.micro_signal === 'EXHAUSTION_EXIT') {
          return { line1: `<span class="seq-strong red">Exhaustion exit</span>`, line2: 'Volume collapsing' };
      }
      if (snap?.micro_signal === 'EARLY_ACCUMULATION') {
          return { line1: `<span class="seq-strong">Early accumulation</span>`, line2: 'Building, not yet a SCALP signal' };
      }
      return { line1: `<span style="color: var(--dim);">No sequence</span>`, line2: '' };
  }

  // ── Per-row detail (chart + info grid) ────────────────────────────────
  function buildDetailHtml(symbol, snaps, basePrice, currPrice, classification, durationSec) {
      const last = snaps[snaps.length - 1] || {};
      const first = snaps[0] || {};
      const drawdown = (() => {
          if (!basePrice || !snaps.length) return 0;
          const lo = Math.min(...snaps.map(s => s.price || basePrice));
          return ((lo / basePrice) - 1) * 100;
      })();
      const peak = (() => {
          if (!basePrice || !snaps.length) return 0;
          const hi = Math.max(...snaps.map(s => s.price || basePrice));
          return ((hi / basePrice) - 1) * 100;
      })();

      // Last 4 snapshots for the volume sequence visual.
      const last4 = snaps.slice(-4);
      const maxVol = Math.max(1, ...last4.map(s => s.volume || 0));
      const seqBars = last4.map((s, i) => {
          const h = ((s.volume || 0) / maxVol) * 100;
          const cls = i === 0 ? '' : (s.volume > last4[i-1].volume ? 'green' : 'red');
          return `<div class="bar ${cls}" style="height: ${h.toFixed(1)}%;" title="${(s.volume || 0).toFixed(0)}"></div>`;
      }).join('');

      return `
        <div class="pw-detail-chart">
          <canvas id="pw-chart-${symbol}"></canvas>
        </div>
        <div class="pw-detail-info">
          <h4>Snapshot</h4>
          <div class="pw-info-grid">
            <div class="pw-info-item"><div class="l">Base price</div><div class="v">${fmtPrice(basePrice)}</div></div>
            <div class="pw-info-item"><div class="l">Current</div><div class="v">${fmtPrice(currPrice)}</div></div>
            <div class="pw-info-item"><div class="l">Peak</div><div class="v green">${fmtPct(peak)}</div></div>
            <div class="pw-info-item"><div class="l">Drawdown</div><div class="v ${drawdown < 0 ? 'red' : ''}">${fmtPct(drawdown)}</div></div>
            <div class="pw-info-item"><div class="l">Time above</div><div class="v">${fmtDur(durationSec)}</div></div>
            <div class="pw-info-item"><div class="l">Snapshots</div><div class="v">${snaps.length}</div></div>
            <div class="pw-info-item"><div class="l">Micro signal</div><div class="v">${last.micro_signal || '—'}</div></div>
            <div class="pw-info-item"><div class="l">Overheated</div><div class="v ${last.is_overheated ? 'red' : ''}">${last.is_overheated ? 'YES' : 'no'}</div></div>
          </div>
          <h4 style="margin-top: 16px;">Last 4 candles — volume</h4>
          <div class="pw-seq-bars">${seqBars}</div>
        </div>
      `;
  }

  // ── Render: a single row ──────────────────────────────────────────────
  function buildRowHtml(symbol, snaps, basePrice, currPrice, classification, durationSec, gainPct) {
      const last = snaps[snaps.length - 1] || {};
      const seq = seqSummary(last);
      const sparkColor = gainPct >= 0 ? '#34d399' : '#f87171';
      const tierLower = classification.tier.toLowerCase();
      const expandedAttr = expandedSymbols.has(symbol) ? 'expanded' : '';

      return `
        <div class="pw-row ${expandedAttr}" data-symbol="${symbol}" data-tier="${classification.tier}">
          <div class="pw-row-main">
            <div class="pw-tier-icon">${classification.icon}</div>
            <div>
              <div class="pw-row-sym">${symbol}</div>
              <div class="pw-row-tier-label ${tierLower === 'hot' ? 'hot' : tierLower === 'watch' ? 'watch' : tierLower === 'fresh' ? 'fresh' : tierLower === 'cooling' ? 'cool' : 'stale'}">${classification.label}</div>
            </div>
            <div class="pw-row-pct ${gainPct >= 0 ? 'green' : 'red'}">${fmtPct(gainPct)}</div>
            <div>${buildSparkline(snaps, sparkColor)}</div>
            <div class="pw-row-seq">
              <div>${seq.line1}</div>
              <div class="seq-meta">${seq.line2 || '&nbsp;'}</div>
            </div>
            <div class="pw-row-time">${fmtDur(durationSec)}</div>
            <div class="pw-row-match">—</div>
            <div class="pw-row-chevron">›</div>
          </div>
          <div class="pw-row-detail">
            ${expandedSymbols.has(symbol) ? buildDetailHtml(symbol, snaps, basePrice, currPrice, classification, durationSec) : ''}
          </div>
        </div>
      `;
  }

  // ── Render the full ranked list ───────────────────────────────────────
  function render() {
      const symbols = Object.keys(lastTimeline).filter(s => (lastTimeline[s] || []).length > 0);
      const now = Date.now() / 1000;

      // Build a row spec per symbol with classification + score.
      const specs = symbols.map(s => {
          const snaps = lastTimeline[s] || [];
          const basePrice = lastBase[s] || 0;
          const lastSnap  = snaps[snaps.length - 1] || {};
          const currPrice = lastPrice[s] || lastSnap.price || 0;
          const firstTs   = snaps[0]?.timestamp || lastSnap.timestamp || now;
          const durationSec = Math.max(0, now - firstTs);
          const gainPct = (basePrice && currPrice) ? ((currPrice / basePrice) - 1) * 100 : 0;
          const cls = classify(s, snaps, basePrice, currPrice, durationSec);
          return { symbol: s, snaps, basePrice, currPrice, classification: cls, durationSec, gainPct };
      });

      specs.sort((a, b) => b.classification.score - a.classification.score);

      // Tier counts for the top bar + chips
      const counts = { HOT: 0, WATCH: 0, FRESH: 0, COOLING: 0, STALE: 0 };
      specs.forEach(spec => { counts[spec.classification.tier]++; });

      $('pw-total').textContent = specs.length;
      $('pw-n-hot').textContent   = counts.HOT;
      $('pw-n-watch').textContent = counts.WATCH;
      $('pw-n-fresh').textContent = counts.FRESH;
      $('pw-n-cool').textContent  = counts.COOLING;
      $('pw-n-stale').textContent = counts.STALE;

      const avgGain = specs.length
          ? specs.reduce((s, sp) => s + sp.gainPct, 0) / specs.length
          : 0;
      $('pw-avg-gain').textContent = specs.length ? fmtPct(avgGain) : '—';
      $('pw-avg-gain').classList.toggle('strongest', avgGain >= 0);

      const strongest = specs.reduce((b, sp) => sp.gainPct > (b?.gainPct ?? -Infinity) ? sp : b, null);
      $('pw-strongest').textContent = strongest
          ? `${strongest.symbol} ${fmtPct(strongest.gainPct)}`
          : '—';

      $('pw-updated').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      // Chip counts
      document.querySelectorAll('#pw-chips .pw-chip').forEach(c => {
          const f = c.dataset.filter;
          const n = c.querySelector('.n');
          if (!n) return;
          if (f === 'all') n.textContent = specs.length;
          else n.textContent = counts[f] ?? 0;
      });

      // Filter
      const filtered = activeFilter === 'all'
          ? specs
          : specs.filter(s => s.classification.tier === activeFilter);

      const rowsEl = $('pw-rows');
      if (!filtered.length) {
          rowsEl.innerHTML = `<div class="pw-empty">${
              specs.length === 0
                  ? 'No coins above the +$0.20 threshold yet.'
                  : `No coins match "${activeFilter}" filter right now.`
          }</div>`;
          return;
      }

      rowsEl.innerHTML = filtered.map(spec =>
          buildRowHtml(spec.symbol, spec.snaps, spec.basePrice, spec.currPrice, spec.classification, spec.durationSec, spec.gainPct)
      ).join('');

      // Wire row click → toggle expand
      rowsEl.querySelectorAll('.pw-row .pw-row-main').forEach(main => {
          main.addEventListener('click', () => {
              const row = main.parentElement;
              const sym = row.dataset.symbol;
              if (expandedSymbols.has(sym)) {
                  expandedSymbols.delete(sym);
                  if (charts[sym]) { charts[sym].destroy(); delete charts[sym]; }
              } else {
                  expandedSymbols.add(sym);
              }
              render();
          });
      });

      // For every expanded row, build/refresh its chart
      filtered.forEach(spec => {
          if (!expandedSymbols.has(spec.symbol)) return;
          const cv = document.getElementById(`pw-chart-${spec.symbol}`);
          if (!cv) return;
          buildChart(cv, spec);
      });
  }

  // ── Chart.js trajectory chart for an expanded row ─────────────────────
  function buildChart(canvas, spec) {
      const sym = spec.symbol;
      const labels = spec.snaps.map(s => (s.time || '').split(' ')[1] || '');
      const pctFromBase = spec.snaps.map(s => spec.basePrice ? ((s.price - spec.basePrice) / spec.basePrice) * 100 : 0);
      const volumes = spec.snaps.map(s => s.volume || 0);

      if (charts[sym]) {
          charts[sym].data.labels = labels;
          charts[sym].data.datasets[0].data = pctFromBase;
          charts[sym].data.datasets[1].data = volumes;
          charts[sym].update('none');
          return;
      }

      charts[sym] = new Chart(canvas.getContext('2d'), {
          type: 'line',
          data: {
              labels,
              datasets: [
                  {
                      label: '% from base',
                      data: pctFromBase,
                      borderColor: spec.gainPct >= 0 ? '#34d399' : '#f87171',
                      backgroundColor: spec.gainPct >= 0 ? 'rgba(52,211,153,0.12)' : 'rgba(248,113,113,0.12)',
                      borderWidth: 2,
                      pointRadius: 0,
                      tension: 0.25,
                      fill: true,
                      yAxisID: 'y',
                  },
                  {
                      label: 'Volume',
                      data: volumes,
                      type: 'bar',
                      backgroundColor: 'rgba(59,130,246,0.18)',
                      borderColor: 'rgba(59,130,246,0.4)',
                      borderWidth: 1,
                      yAxisID: 'y1',
                  },
              ],
          },
          options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: false,
              plugins: { legend: { display: true, labels: { color: '#b8c2d6', font: { size: 10 }, boxWidth: 12 } } },
              interaction: { intersect: false, mode: 'index' },
              scales: {
                  x: { ticks: { color: '#64748b', font: { size: 9 }, maxTicksLimit: 6 }, grid: { color: 'rgba(30,48,80,0.5)' } },
                  y: {
                      position: 'left',
                      ticks: {
                          color: '#64748b',
                          font: { size: 10 },
                          callback: v => `${v >= 0 ? '+' : ''}${v.toFixed(2)}%`,
                      },
                      grid: { color: 'rgba(30,48,80,0.5)' },
                  },
                  y1: { position: 'right', display: false, grid: { display: false } },
              },
          },
      });
  }

  // ── Filter chips ──────────────────────────────────────────────────────
  document.querySelectorAll('#pw-chips .pw-chip').forEach(chip => {
      chip.addEventListener('click', () => {
          document.querySelectorAll('#pw-chips .pw-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeFilter = chip.dataset.filter || 'all';
          // Wipe charts of rows that won't be visible to free memory
          for (const sym of Object.keys(charts)) { charts[sym].destroy(); delete charts[sym]; }
          render();
      });
  });

  // ── Data ingestion ────────────────────────────────────────────────────
  function ingestPayload(data) {
      // Timeline → ANALYSIS_020_TIMELINE hash
      const raw = data.fullTimeline || {};
      const tl = {};
      for (const [s, v] of Object.entries(raw)) {
          try { tl[s] = typeof v === 'string' ? JSON.parse(v) : v; }
          catch { tl[s] = []; }
      }
      lastTimeline = tl;

      // Base prices → PROFIT_REACHED_020 hash
      const profitRaw = data.profitTimeline || {};
      const bp = {};
      for (const [s, v] of Object.entries(profitRaw)) {
          try {
              const r = typeof v === 'string' ? JSON.parse(v) : v;
              if (r && r.basePrice) bp[s] = parseFloat(r.basePrice);
          } catch {}
      }
      lastBase = bp;

      // Live prices → CURRENT_PRICE hash
      const priceRaw = data.priceHash || {};
      const lp = { ...lastPrice };
      for (const [s, v] of Object.entries(priceRaw)) {
          try {
              const r = typeof v === 'string' ? JSON.parse(v) : v;
              if (r && r.price != null) lp[s] = parseFloat(r.price);
          } catch {}
      }
      lastPrice = lp;
  }

  // ── Socket.io ─────────────────────────────────────────────────────────
  const socket = io();
  const live = $('pw-live');
  socket.on('connect',    () => { live.classList.remove('off'); live.textContent = 'Live'; });
  socket.on('disconnect', () => { live.classList.add('off');    live.textContent = 'Disconnected'; });
  socket.on('update', (data) => { ingestPayload(data); render(); });

  // First paint (in case the socket hasn't ticked yet)
  render();
</script>
</body>
</html>
