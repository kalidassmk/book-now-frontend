<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Book-Now — Coin Detail</title>
<style>
  :root {
    --bg: #0c1116; --panel: #141b24; --panel-2: #1a232e; --line: #1f2933;
    --accent: #29b6f6; --good: #2ecc71; --bad: #e74c3c; --warn: #f1c40f;
    --neutral: #8b949e; --calm: #6c8eef;
    --text: #e6edf3; --muted: #8b949e;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font: 13px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; }
  h1 { margin: 0 0 4px; font-size: 24px; }
  h2 { margin: 0 0 10px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  .sub { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.85);} }
  .topnav { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .topnav a { display: inline-block; padding: 6px 14px; border-radius: 6px; background: var(--panel); border: 1px solid var(--line); color: var(--muted); text-decoration: none; font-size: 12px; font-weight: 600; }
  .topnav a.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .topnav a:not(.active):hover { color: var(--text); border-color: var(--muted); }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
  .card .card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; }
  .card .card-head h3 { margin:0; font-size:15px; }
  .pos { color: var(--good); } .neg { color: var(--bad); } .mute { color: var(--muted); } .warn { color: var(--warn); }

  /* iter 108 — Sell Price Planner ──────────────────────────────────── */
  .card.sell-planner h2 { color: var(--warn); }
  .planner-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start; }
  @media (max-width: 800px) { .planner-grid { grid-template-columns: 1fr; } }
  .planner-stat { padding:10px 12px; background: var(--panel-2); border:1px solid var(--line); border-radius:6px; margin-bottom:8px; }
  .planner-stat .label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:.4px; color: var(--muted); font-weight:700; }
  .planner-stat .value { display:block; font-size:18px; font-weight:800; font-variant-numeric:tabular-nums; margin-top:2px; }
  .planner-stat .value.strong { font-size:22px; color: var(--warn); }
  .planner-stat .sub { display:block; font-size:11px; color:var(--muted); margin-top:2px; }
  .planner-feeparts { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .planner-feeparts .fee-line { font-size:10px; color:var(--muted); }
  .planner-feeparts .fee-line.muted { font-style:italic; }
  .planner-calc { margin-bottom:14px; padding:12px; background: var(--panel-2); border:1px solid var(--line); border-radius:6px; }
  .planner-calc input { width:100%; padding:8px 10px; font-size:18px; font-weight:700; background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:5px; font-variant-numeric:tabular-nums; }
  .planner-calc .label { display:block; font-size:11px; color:var(--muted); margin-bottom:4px; }
  .planner-result { font-size:14px; margin-top:6px; color:var(--text); }
  .planner-result .pos { color: var(--good); }
  .planner-result .neg { color: var(--bad); }
  .planner-presets { display:flex; flex-wrap:wrap; gap:6px; padding-top:6px; }
  .planner-presets .label { width:100%; font-size:11px; color:var(--muted); margin-bottom:4px; }
  .preset-btn { background:var(--panel-2); border:1px solid var(--line); color:var(--text); font-size:11px; padding:5px 9px; border-radius:4px; cursor:pointer; font-variant-numeric:tabular-nums; transition:all .15s; }
  .preset-btn:hover { background: var(--accent); border-color:var(--accent); color:#fff; }
  .planner-note { font-size:10px; color:var(--muted); margin-top:12px; font-style:italic; text-align:center; }

  /* iter 102 — Order Flow section ─────────────────────────────────── */
  .of-summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; margin-bottom: 12px;
  }
  .of-stat {
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 12px;
  }
  .of-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 700; }
  .of-stat-value { font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .of-stat-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .of-bar {
    margin: 8px 0 14px;
  }
  .of-bar-track {
    display: flex; height: 24px; border-radius: 5px; overflow: hidden;
    background: rgba(139,148,158,.12); border: 1px solid var(--line);
    font-size: 11px; font-weight: 800; color: #fff;
  }
  .of-bar-buy  { background: var(--good); display: flex; align-items: center; justify-content: center; transition: width .3s; }
  .of-bar-sell { background: var(--bad);  display: flex; align-items: center; justify-content: center; transition: width .3s; }

  .of-highlights {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;
  }
  .of-highlight {
    padding: 8px 12px; border-radius: 6px; border: 1px solid;
  }
  .of-highlight.pos { background: rgba(46,204,113,.10); border-color: var(--good); }
  .of-highlight.neg { background: rgba(231,76,60,.12); border-color: var(--bad); }
  .of-highlight-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .4px; }
  .of-highlight-time  { font-size: 11px; color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin-top: 2px; }
  .of-highlight-data  { font-size: 13px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }

  .of-table-wrap {
    max-height: 480px; overflow-y: auto;
    border: 1px solid var(--line); border-radius: 6px;
  }
  .of-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .of-table thead { position: sticky; top: 0; background: var(--panel-2); z-index: 1; }
  .of-table th {
    padding: 8px 10px; text-align: left; font-size: 10px;
    text-transform: uppercase; letter-spacing: .4px; color: var(--muted);
    border-bottom: 1px solid var(--line); white-space: nowrap;
  }
  .of-table td {
    padding: 5px 10px; border-bottom: 1px solid rgba(139,148,158,.08);
    white-space: nowrap;
  }
  .of-table tr.of-row:hover { background: rgba(255,255,255,.02) !important; }
  .of-table .of-time { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--text); font-weight: 700; }
  .of-table .of-close { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--text); }
  .of-table .of-chg { font-weight: 700; }
  .of-table .of-vol, .of-table .of-buy, .of-table .of-sell { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .of-table .of-pct { font-weight: 700; color: var(--text); }
  .of-table .of-trades { color: var(--muted); font-size: 11px; }
  .of-table .of-class .m-chip { font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 700; letter-spacing: .3px; }
  .of-table .m-chip.pos { background: rgba(46,204,113,.18); color: var(--good); }
  .of-table .m-chip.neg { background: rgba(231,76,60,.20); color: var(--bad); }

  /* Search box */
  .search-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; }
  .search-row input { flex: 1; padding: 10px 14px; background: var(--panel); border: 1px solid var(--line); border-radius: 6px; color: var(--text); font-size: 14px; font-weight: 600; text-transform: uppercase; }
  .search-row button { padding: 10px 18px; background: var(--accent); color: #fff; border: 0; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; }

  /* Header */
  .coin-header { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: end; margin-bottom: 14px; }
  .coin-name { font-size: 32px; font-weight: 700; }
  .coin-price { font-size: 28px; font-variant-numeric: tabular-nums; font-weight: 700; }
  .coin-meta { display: flex; gap: 18px; color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* Signal Quality verdict */
  .verdict { padding: 18px 22px; border-radius: 12px; margin-bottom: 14px; border-width: 2px; border-style: solid; }
  .verdict.good { background: rgba(46,204,113,.15); border-color: var(--good); }
  .verdict.warn { background: rgba(241,196,15,.18); border-color: var(--warn); }
  .verdict.bad { background: rgba(231,76,60,.18); border-color: var(--bad); }
  .verdict.mute { background: rgba(139,148,158,.12); border-color: var(--neutral); }
  .verdict .v-row { display: flex; gap: 14px; align-items: center; }
  .verdict .v-emoji { font-size: 40px; line-height: 1; }
  .verdict .v-label { font-size: 24px; font-weight: 800; letter-spacing: .5px; }
  .verdict.good .v-label { color: var(--good); }
  .verdict.warn .v-label { color: var(--warn); }
  .verdict.bad .v-label { color: var(--bad); }
  .verdict.mute .v-label { color: var(--neutral); }
  .verdict ul { margin: 10px 0 0 0; padding-left: 20px; color: var(--text); font-size: 13px; }
  .verdict li { margin-bottom: 2px; }

  /* Grids */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  /* Detector cards */
  .det-card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; }
  .det-card h3 { margin: 0 0 8px; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; display: flex; align-items: center; gap: 8px; }
  .det-card .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .det-card .status.active { background: rgba(46,204,113,.18); color: var(--good); border: 1px solid rgba(46,204,113,.4); }
  .det-card .status.dump { background: rgba(231,76,60,.18); color: var(--bad); border: 1px solid rgba(231,76,60,.4); }
  .det-card .status.watch { background: rgba(241,196,15,.15); color: var(--warn); border: 1px solid rgba(241,196,15,.35); }
  .det-card .status.none { background: rgba(139,148,158,.10); color: var(--muted); border: 1px solid rgba(139,148,158,.25); }
  .det-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
  .det-row .k { color: var(--muted); }
  .det-row .v { font-variant-numeric: tabular-nums; font-weight: 600; }
  .det-age { font-size: 10px; color: var(--muted); font-weight: 400; margin-left: auto; }

  /* Filter table */
  .filter-tbl { width: 100%; border-collapse: collapse; }
  .filter-tbl td { padding: 7px 8px; border-bottom: 1px solid var(--line); font-size: 12px; }
  .filter-tbl tr:last-child td { border-bottom: 0; }
  .filter-tbl .f-status { width: 30px; text-align: center; font-size: 16px; }
  .filter-tbl .f-name { font-weight: 600; }
  .filter-tbl .f-reason { color: var(--muted); font-size: 11px; }
  .filter-tbl tr.blocked td { background: rgba(231,76,60,.06); }
  .filter-tbl tr.blocked .f-reason { color: var(--bad); font-weight: 600; }

  /* Orderbook */
  .ob-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .ob-block { padding: 10px 14px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; }
  .ob-block .label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .ob-block .value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .ob-block .sub { font-size: 11px; color: var(--muted); }

  /* Price action chart */
  .pa-chart { display: flex; align-items: flex-end; gap: 2px; height: 80px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; padding: 6px; margin-bottom: 8px; }
  .pa-chart .bar { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; min-width: 6px; position: relative; }
  .pa-chart .bar .price-bar { background: var(--neutral); border-radius: 2px 2px 0 0; opacity: .8; }
  .pa-chart .bar.green .price-bar { background: var(--good); }
  .pa-chart .bar.red .price-bar { background: var(--bad); }
  .pa-vol { display: flex; align-items: flex-end; gap: 2px; height: 30px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; padding: 4px; }
  .pa-vol .vbar { flex: 1; background: var(--accent); opacity: .5; border-radius: 1px; min-width: 6px; }
  .pa-summary { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 10px; font-size: 12px; }
  .pa-summary div { padding: 6px 10px; background: var(--panel-2); border-radius: 6px; }
  .pa-summary .label { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .pa-summary .value { font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }

  /* Trades table */
  .trades-tbl { width: 100%; border-collapse: collapse; }
  .trades-tbl th, .trades-tbl td { padding: 6px 10px; text-align: left; font-size: 11px; border-bottom: 1px solid var(--line); }
  .trades-tbl th { color: var(--muted); text-transform: uppercase; font-size: 10px; }
  .trades-tbl .num { text-align: right; font-variant-numeric: tabular-nums; }
  .side-buy { color: var(--good); font-weight: 600; }
  .side-sell { color: var(--bad); font-weight: 600; }

  /* Empty / loading */
  .empty { padding: 24px; text-align: center; color: var(--muted); font-style: italic; }
  .loading { color: var(--muted); font-style: italic; }

  /* iter 85 — Redesigned alerts feed (compact, scannable, no floating dots) */
  .alerts-hero {
    background: linear-gradient(135deg, rgba(41,182,246,.10) 0%, var(--panel) 60%);
    border: 1px solid rgba(41,182,246,.30);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .alerts-hero h2 { margin: 0 0 4px; font-size: 16px; color: var(--text); text-transform: none; letter-spacing: 0; }
  .alerts-hero .sub { color: var(--muted); font-size: 12px; margin: 0; }
  .alerts-hero .chips { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .alerts-hero .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 11px; font-weight: 700;
    color: var(--muted);
  }
  .alerts-hero .chip .num { font-variant-numeric: tabular-nums; color: var(--text); }
  .alerts-hero .meta-right { margin-left: auto; font-size: 11px; color: var(--muted); }

  .alerts-section {
    background: var(--panel);
    border: 1px solid var(--line);
    border-left-width: 3px;
    border-radius: 8px;
    padding: 12px 14px 10px;
    margin-bottom: 10px;
  }
  .alerts-section.s-trade    { border-left-color: #c084fc; }
  .alerts-section.s-mytrades { border-left-color: #c084fc; }  /* iter95 */
  .alerts-section.s-strong   { border-left-color: var(--good); }
  .alerts-section.s-watch    { border-left-color: var(--warn); }
  .alerts-section.s-weak     { border-left-color: #e67e22; }
  .alerts-section.s-dump     { border-left-color: var(--bad); }
  /* iter91 — pinned Top-5 buy panel: brighter accent + glow */
  .alerts-section.s-top5 {
    border-left-color: #ffd54f;
    border-left-width: 4px;
    background: linear-gradient(180deg, rgba(255,213,79,.06), transparent 60%), var(--panel);
    box-shadow: 0 0 0 1px rgba(255,213,79,.15), 0 6px 18px rgba(0,0,0,.25);
  }
  .alerts-section.s-top5 .sec-title { color: #ffd54f; }
  /* iter121 — browser-pop-up toggle on the Top-5 panel */
  .notif-toggle {
    font-size: 11px; font-weight: 600; letter-spacing: .2px;
    padding: 4px 10px; border-radius: 14px;
    border: 1px solid var(--border); background: var(--panel2, #1b2130);
    color: var(--muted); cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
    margin-right: 8px;
  }
  .notif-toggle:hover { color: var(--text); border-color: var(--muted); }
  .notif-toggle.on {
    background: rgba(22,199,132,.15);
    border-color: rgba(22,199,132,.5);
    color: var(--good);
  }
  .alerts-section .sec-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .alerts-section .sec-title {
    font-size: 12px; font-weight: 700; letter-spacing: .3px;
    text-transform: uppercase;
  }
  .alerts-section.s-trade    .sec-title { color: #c084fc; }
  .alerts-section.s-mytrades .sec-title { color: #c084fc; }  /* iter95 */
  .alerts-section.s-strong   .sec-title { color: var(--good); }
  .alerts-section.s-watch    .sec-title { color: var(--warn); }
  .alerts-section.s-weak     .sec-title { color: #e67e22; }
  .alerts-section.s-dump     .sec-title { color: var(--bad); }
  .alerts-section .sec-desc { font-size: 10px; color: var(--muted); margin-left: 8px; font-weight: 400; text-transform: none; letter-spacing: 0; }
  .alerts-section .sec-count {
    font-size: 11px; font-weight: 700; color: var(--muted);
    background: var(--panel-2); padding: 2px 8px; border-radius: 10px;
  }
  .alerts-section .sec-rows {
    display: flex; flex-direction: column; gap: 2px;
  }
  /* iter89 — per-detector sub-headers within a section */
  .alerts-section .sub-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 8px 0 2px;
    padding: 3px 8px;
    background: rgba(139,148,158,.06);
    border-radius: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: .3px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .alerts-section .sub-head:first-child { margin-top: 0; }
  .alerts-section .sub-title { color: #b6c2cf; }
  .alerts-section .sub-count {
    font-size: 10px; font-weight: 700;
    background: var(--panel-2); color: var(--muted);
    padding: 1px 7px; border-radius: 8px;
  }
  .alerts-section .sec-more {
    font-size: 10px; color: var(--muted);
    padding: 3px 10px 0; font-style: italic;
  }

  .alert-row {
    display: grid;
    /* iter90 — last col widened to fit "HH:MM:SS / YYYY-MM-DD IST / 5.2h ago" */
    grid-template-columns: 20px minmax(110px, auto) minmax(120px, auto) 1fr auto 130px;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 5px;
    color: var(--text);
    text-decoration: none;
    transition: background .12s;
    cursor: pointer;
  }
  .alert-row:hover { background: rgba(41,182,246,.08); }
  .alert-row:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
  .alert-row .a-ic { font-size: 14px; text-align: center; }
  .alert-row .a-sym {
    font: 700 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: .3px;
    color: var(--text);
  }
  .alert-row .a-source {
    font-size: 10px; font-weight: 700; letter-spacing: .4px;
    text-transform: uppercase; color: var(--muted);
  }
  .alert-row .a-metrics {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    font-size: 11px;
  }
  .alert-row .m-chip {
    display: inline-flex; align-items: center;
    padding: 1px 7px;
    border-radius: 3px;
    background: rgba(139,148,158,.12);
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .alert-row .m-chip.pos { background: rgba(46,204,113,.15); color: var(--good); }
  .alert-row .m-chip.neg { background: rgba(231,76,60,.18); color: var(--bad); }
  .alert-row .m-chip.vol { background: rgba(41,182,246,.12); color: var(--accent); }
  .alert-row .m-chip.score { background: rgba(108,142,239,.15); color: #8eb0ff; }
  /* iter 90 — IST timestamp stack (HH:MM:SS / YYYY-MM-DD / 5.2h ago) */
  .alert-row .a-when {
    display: flex; flex-direction: column; align-items: flex-end;
    line-height: 1.15;
    font-variant-numeric: tabular-nums;
    min-width: 120px;
  }
  .alert-row .a-when .a-time {
    font: 700 11px/1.15 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--text);
    letter-spacing: .3px;
  }
  .alert-row .a-when .a-date {
    font: 600 9.5px/1.15 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--muted);
    letter-spacing: .2px;
  }
  .alert-row .a-when .a-ago {
    font-size: 9.5px; color: #7d8794;
    font-style: italic;
  }
  .alert-row .a-ago {
    font-size: 10px; color: var(--muted);
    min-width: 60px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .alert-row .bn-binance-link { padding: 2px 6px; font-size: 10px; }
  .alerts-section .sec-more {
    text-align: center; font-size: 10px; color: var(--muted);
    padding: 6px 0 2px; font-style: italic;
  }

  @media (max-width: 800px) {
    .alert-row { grid-template-columns: 20px 1fr auto; row-gap: 4px; }
    .alert-row .a-source { grid-column: 2; font-size: 9px; }
    .alert-row .a-metrics { grid-column: 1 / -1; padding-left: 30px; }
    .alert-row .a-ago { grid-row: 1; }
  }
</style>
</head>
<body>

<h1>🔬 Coin Detail</h1>
<div class="sub">
  <span class="live-dot"></span>
  <span id="status">Loading…</span>
  <span style="color:var(--muted)">One-stop view: signal quality + all 5 detectors + filters + orderbook + position</span>
</div>



<div class="search-row">
  <input type="text" id="search-input" placeholder="Enter symbol — e.g. NEIROUSDT, BTCUSDT, ETHUSDT" />
  <button onclick="loadSymbol()">🔍 Load</button>
  <button onclick="refresh()" id="refresh-btn" disabled>↻ Refresh</button>
</div>

<div id="content"></div>

<script>
let currentSym = null;

// iter 108 — fetch live BNB/USDT so commissions paid in BNB convert to
// USDT for the Sell Price Planner.  Mirrors iter107 in premium.html.
async function fetchBnbPrice() {
  try {
    const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BNBUSDT');
    if (!r.ok) return;
    const j = await r.json();
    const p = parseFloat(j.price);
    if (p > 0) window.__bnbUsdtPrice = p;
  } catch (_) {}
}
fetchBnbPrice();
setInterval(fetchBnbPrice, 60000);

function fmtPrice(p) {
  if (p == null || isNaN(p)) return '—';
  if (p >= 100) return p.toFixed(2);
  if (p >= 1) return p.toFixed(4);
  return p.toFixed(8);
}
function fmtUsd(n) {
  if (!n && n !== 0) return '—';
  const sign = n < 0 ? '-' : '';
  const a = Math.abs(n);
  if (a >= 1e9) return sign + '$' + (a / 1e9).toFixed(2) + 'B';
  if (a >= 1e6) return sign + '$' + (a / 1e6).toFixed(1) + 'M';
  if (a >= 1e3) return sign + '$' + (a / 1e3).toFixed(1) + 'K';
  return sign + '$' + a.toFixed(2);
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  return (n > 0 ? '+' : '') + n.toFixed(2) + '%';
}
function fmtTime(ms) {
  if (!ms) return '—';
  return new Date(ms).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
function fmtAge(ms) {
  if (!ms) return '';
  const diff = Date.now() - ms;
  if (diff < 60_000) return Math.floor(diff/1000) + 's ago';
  if (diff < 3600_000) return Math.floor(diff/60000) + 'm ago';
  return Math.floor(diff/3600000) + 'h ago';
}

function renderDetectorCard(name, emoji, data, opts = {}) {
  let statusClass = 'none', statusLabel = '—';
  if (data) {
    const label = (data.label || data.tier || '').toUpperCase();
    if (label.includes('PUMP') || label === 'STRONG' || label === 'NORMAL' || label.includes('REVERSAL_UP') || label === 'EXPLOSIVE_PUMP') {
      statusClass = 'active'; statusLabel = label;
    } else if (label.includes('DUMP') || label === 'BREAKDOWN_RISK' || label.includes('BREAKDOWN')) {
      statusClass = 'dump'; statusLabel = label;
    } else if (label === 'EARLY' || label.includes('WATCH') || label === 'MEGA' || label === 'NEUTRAL') {
      statusClass = 'watch'; statusLabel = label;
    } else if (label) {
      statusClass = 'watch'; statusLabel = label;
    }
  }
  let body = '';
  if (data) {
    const age = data.ts ? `<span class="det-age">${fmtAge(data.ts)}</span>` : '';
    const rows = (opts.rows || []).map(([k, v]) =>
      `<div class="det-row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');
    body = `${rows}`;
    return `
      <div class="det-card">
        <h3>${emoji} ${name} <span class="status ${statusClass}">${statusLabel}</span> ${age}</h3>
        ${body || '<div class="mute" style="font-size:11px">Signal active</div>'}
      </div>
    `;
  }
  return `
    <div class="det-card">
      <h3>${emoji} ${name} <span class="status none">No signal</span></h3>
      <div class="mute" style="font-size:11px">No active detection on this coin.</div>
    </div>
  `;
}

function render(payload) {
  const p = payload;
  const m = p.market || {};
  const sq = p.signal_quality || {};

  // Signal-quality card
  const verdictHtml = `
    <div class="verdict ${sq.color || 'mute'}">
      <div class="v-row">
        <div class="v-emoji">${sq.emoji || ''}</div>
        <div>
          <div class="v-label">${sq.verdict || 'UNKNOWN'}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${currentSym} — Signal Quality verdict</div>
        </div>
      </div>
      <ul>${(sq.reasons || []).map(r => `<li>${r}</li>`).join('')}</ul>
    </div>
  `;

  // Detector cards
  const detPR = p.detectors.pump_rider;
  const detEP = p.detectors.early_pump;
  const detVSP = p.detectors.vsp;
  const detLMC = p.detectors.lmc;
  const detCCP = p.detectors.ccp;

  const detectorsHtml = `
    <div class="card">
      <h2>Detector Signals (latest per coin)</h2>
      <div class="grid-3" style="margin-bottom:14px">
        ${renderDetectorCard('PumpRider', '⚡', detPR ? { ...detPR, label: detPR.tier } : null, { rows: detPR ? [
          ['chg_5m', (detPR.chg_5m ?? '—') + '%'],
          ['chg_1h', (detPR.chg_1h ?? '—') + '%'],
          ['vol_surge_5m', (detPR.vol_surge_5m ?? '—') + '×'],
        ] : [] })}
        ${renderDetectorCard('Early Pump', '🚀', detEP, { rows: detEP ? [
          ['Score', detEP.score ?? '—'],
          ['Green/10', detEP.factors?.green_candles_10 ?? '—'],
          ['Vol surge', (detEP.factors?.vol_surge_ratio ?? '—') + '×'],
          ['Buy ratio', (detEP.factors?.taker_buy_ratio_pct ?? '—') + '%'],
        ] : [] })}
        ${renderDetectorCard('VSP', '⚡', detVSP, { rows: detVSP ? [
          ['D-score', detVSP.direction_score ?? '—'],
          ['M-score', detVSP.magnitude_score ?? '—'],
          ['Confidence', detVSP.confidence ?? '—'],
          ['vol_5m×', detVSP.entry?.vol_5m_mult ?? '—'],
        ] : [] })}
      </div>
      <div class="grid-2">
        ${renderDetectorCard('LMC (Low MCap)', '💎', detLMC, { rows: detLMC ? [
          ['Score', detLMC.score ?? '—'],
          ['vol_surge', (detLMC.vol_surge_x ?? '—') + '×'],
          ['7d avg vol', fmtUsd(detLMC.avg_7d_vol_usd)],
          ['chg_24h', (detLMC.chg_24h_pct ?? '—') + '%'],
        ] : [] })}
        ${renderDetectorCard('CCP (Consolidation)', '🌊', detCCP, { rows: detCCP ? [
          ['Score', detCCP.score ?? '—'],
          ['vol_drying', detCCP.breakdown?.vol_drying?.ratio ?? '—'],
          ['range/atr', detCCP.breakdown?.range_contraction?.ratio_vs_atr ?? '—'],
          ['pos_24h', (detCCP.direction_breakdown?.pos_24h_pct ?? '—') + '%'],
        ] : [] })}
      </div>
    </div>
  `;

  // Filters table
  const filters = p.filters || [];
  const filtersHtml = `
    <div class="card">
      <h2>Pre-Buy Filters (/api/check-coin pipeline)</h2>
      ${filters.length ? `
      <table class="filter-tbl">
        ${filters.map(f => `
          <tr class="${f.blocked ? 'blocked' : ''}">
            <td class="f-status">${f.blocked ? '❌' : f.pass === false ? '⚠️' : '✅'}</td>
            <td class="f-name">${f.name || f.id}</td>
            <td class="f-reason">${f.reason || (f.blocked ? 'BLOCKED' : 'pass')}</td>
          </tr>
        `).join('')}
      </table>` : '<div class="empty">No filter results.</div>'}
    </div>
  `;

  // Orderbook
  const ob = p.orderbook;
  const obHtml = `
    <div class="card">
      <h2>Orderbook (top 20)</h2>
      ${ob ? `
      <div class="ob-grid">
        <div class="ob-block"><div class="label">Best Bid</div><div class="value pos">${fmtPrice(ob.best_bid)}</div></div>
        <div class="ob-block"><div class="label">Best Ask</div><div class="value neg">${fmtPrice(ob.best_ask)}</div></div>
        <div class="ob-block"><div class="label">Spread</div><div class="value">${ob.spread_pct.toFixed(3)}%</div><div class="sub">${ob.spread_pct > 0.5 ? '⚠️ Wide (>0.5%)' : 'OK'}</div></div>
        <div class="ob-block"><div class="label">Mid</div><div class="value">${fmtPrice(ob.mid)}</div></div>
        <div class="ob-block"><div class="label">Bid depth (±0.5%)</div><div class="value">${fmtUsd(ob.bid_depth_within_0_5pct_usdt)}</div><div class="sub">supports market-exit</div></div>
        <div class="ob-block"><div class="label">Ask depth (±0.5%)</div><div class="value">${fmtUsd(ob.ask_depth_within_0_5pct_usdt)}</div><div class="sub">supply pressure</div></div>
      </div>` : '<div class="empty">No depth data.</div>'}
    </div>
  `;

  // iter 86 — Suggested Entry card (for manual buys on Binance)
  const sg = ob && ob.suggested;
  function priceClickToCopy(price, kind) {
    return `<span style="cursor:pointer" onclick="navigator.clipboard.writeText('${price}'); this.textContent='✓ copied'; setTimeout(()=>this.textContent='${fmtPrice(price)}', 1200)" title="Click to copy">${fmtPrice(price)}</span>`;
  }
  function fillRow(fill, label) {
    if (!fill) return '';
    const slipClass = fill.slip_pct > 0.5 ? 'neg' : fill.slip_pct > 0.2 ? 'warn' : 'pos';
    const ratio = fill.filled && fill.usd ? fill.filled / fill.usd : 1;
    const warn = ratio < 0.99 ? ' <span style="color:var(--bad);font-size:10px">⚠️ partial fill (book too thin)</span>' : '';
    return `
      <tr>
        <td><strong>${label}</strong></td>
        <td class="num">${fmtPrice(fill.avg_price)}</td>
        <td class="num ${slipClass}">${fill.slip_pct > 0 ? '+' : ''}${fill.slip_pct.toFixed(3)}%</td>
        <td class="num">${fill.qty}</td>
        <td>${warn || '<span style="color:var(--good);font-size:10px">✓ full fill</span>'}</td>
      </tr>
    `;
  }
  const sgHtml = sg ? `
    <div class="card" style="background:linear-gradient(135deg,rgba(46,204,113,.06) 0%,var(--panel) 60%);border-color:rgba(46,204,113,.30)">
      <h2 style="color:var(--good)">💰 Suggested Entry Prices (for manual buys on Binance)</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:12px">
        <div class="ob-block">
          <div class="label">🎯 Maker — Patient</div>
          <div class="value pos" style="font-size:20px">${priceClickToCopy(sg.maker_patient)}</div>
          <div class="sub">Sit at best bid. May not fill if price runs up. 0% taker fee.</div>
        </div>
        <div class="ob-block">
          <div class="label">⚡ Maker — Aggressive</div>
          <div class="value pos" style="font-size:20px">${priceClickToCopy(sg.maker_aggressive)}</div>
          <div class="sub">1 tick above bid. Front-runs the queue. Still maker.</div>
        </div>
        <div class="ob-block">
          <div class="label">🚀 Taker — Instant</div>
          <div class="value neg" style="font-size:20px">${priceClickToCopy(sg.taker_instant)}</div>
          <div class="sub">Hit best ask. Instant fill. Pays taker fee.</div>
        </div>
      </div>
      <h3 style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:14px 0 6px">Slippage estimate (market-buy walks the ask side)</h3>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.4px;text-align:left">
          <th style="padding:4px 8px">Order size</th>
          <th class="num" style="padding:4px 8px">Avg fill price</th>
          <th class="num" style="padding:4px 8px">Slippage</th>
          <th class="num" style="padding:4px 8px">Qty filled</th>
          <th style="padding:4px 8px">Status</th>
        </tr></thead>
        <tbody style="font-variant-numeric:tabular-nums">
          ${fillRow(sg.fill_50, '$50')}
          ${fillRow(sg.fill_100, '$100')}
          ${fillRow(sg.fill_200, '$200')}
        </tbody>
      </table>
      <div style="margin-top:10px;font-size:11px;color:var(--muted);text-align:right">
        💡 Click any price above to copy to clipboard. Open Binance and paste into the order form.
      </div>
    </div>
  ` : '';

  // Price action chart
  const pa = p.price_action;
  let chartHtml = '<div class="empty">No price action data.</div>';
  if (pa && pa.bars && pa.bars.length) {
    const bars = pa.bars;
    const maxC = Math.max(...bars.map(b => b.h));
    const minC = Math.min(...bars.map(b => b.l));
    const range = Math.max(maxC - minC, 1e-12);
    const maxV = Math.max(...bars.map(b => b.v));
    const priceBars = bars.map(b => {
      const klass = b.c > b.o ? 'green' : b.c < b.o ? 'red' : '';
      const hPct = ((b.c - minC) / range) * 100;
      const lPct = ((b.l - minC) / range) * 100;
      const top = Math.max(lPct, 5);
      return `<div class="bar ${klass}"><div class="price-bar" style="height:${top}%"></div></div>`;
    }).join('');
    const volBars = bars.map(b => {
      const h = maxV > 0 ? (b.v / maxV) * 100 : 0;
      return `<div class="vbar" style="height:${h}%"></div>`;
    }).join('');
    chartHtml = `
      <div class="pa-chart">${priceBars}</div>
      <div class="pa-vol">${volBars}</div>
      <div class="pa-summary">
        <div><div class="label">chg_5m</div><div class="value ${pa.chg_5m_pct >= 0 ? 'pos' : 'neg'}">${fmtPct(pa.chg_5m_pct)}</div></div>
        <div><div class="label">chg_15m</div><div class="value ${pa.chg_15m_pct >= 0 ? 'pos' : 'neg'}">${fmtPct(pa.chg_15m_pct)}</div></div>
        <div><div class="label">chg_1h</div><div class="value ${pa.chg_1h_pct >= 0 ? 'pos' : 'neg'}">${fmtPct(pa.chg_1h_pct)}</div></div>
        <div><div class="label">vol_ratio (recent/prior)</div><div class="value ${pa.vol_ratio_recent_vs_prior >= 1 ? 'pos' : 'neg'}">${pa.vol_ratio_recent_vs_prior.toFixed(2)}×</div></div>
      </div>
    `;
  }
  const priceActionHtml = `
    <div class="card">
      <h2>Price Action (last 60min, 5m bars)</h2>
      ${chartHtml}
    </div>
  `;

  // Position
  const pos = p.position;

  // iter 108 — Sell Price Planner.
  // Computes precise NET P&L using actual buy fees (BNB / USDT / base
  // asset commissions converted), shows break-even, and lets the
  // operator either pick a sell price OR a target net to see what to
  // place on Binance.
  // ────────────────────────────────────────────────────────────────
  function planSellComputeFees(bd) {
    // bd = pos.buy_breakdown (server iter108 payload)
    // Returns { buy_fee_usdt, buy_fee_breakdown }.
    if (!bd || !bd.commissions_by_asset) return { buy_fee_usdt: 0, parts: [] };
    const symBase = (currentSym || '').toUpperCase().replace(/USDT$/, '');
    const lastPrice = (p.market && p.market.last_price) || pos.last_price || 0;
    const avgBuyPrice = bd.matched_avg_price || 0;
    const bnb = window.__bnbUsdtPrice || 0;
    let total = 0;
    const parts = [];
    for (const [asset, qty] of Object.entries(bd.commissions_by_asset)) {
      if (!asset || !(qty > 0)) continue;
      let usd = 0; let note = '';
      if (asset === 'USDT') {
        usd = qty;
        note = `${qty.toFixed(6)} USDT (direct)`;
      } else if (asset === 'BNB' && bnb > 0) {
        usd = qty * bnb;
        note = `${qty.toFixed(8)} BNB × $${bnb.toFixed(2)}`;
      } else if (asset === symBase && avgBuyPrice > 0) {
        usd = qty * avgBuyPrice;
        note = `${qty.toFixed(6)} ${asset} × $${avgBuyPrice}`;
      } else if (lastPrice > 0) {
        usd = qty * lastPrice;
        note = `${qty.toFixed(6)} ${asset} × ~$${lastPrice.toFixed(8)} (approx)`;
      }
      total += usd;
      parts.push({ asset, qty, usd, note });
    }
    return { buy_fee_usdt: total, parts };
  }

  let posHtml = '';
  if (pos) {
    const bd = pos.buy_breakdown || null;
    const { buy_fee_usdt, parts } = planSellComputeFees(bd);
    // True buy cost = actual sum of quoteQty across matched fills
    const buyCost = (bd && bd.matched_quote_usdt) || pos.cost_usdt;
    const totalCostIn = buyCost + buy_fee_usdt;
    const qty = pos.qty;
    // Sell-side fee rate.  Binance default 0.075% per side; with the
    // BNB-discount (-25%) it becomes 0.05625%.  We can't be 100% sure
    // which one the operator's account uses for sells without inspecting
    // a known sell.  Default to the discounted rate since BNB-discount
    // is on (iter107 confirmed 70% of fees are BNB).
    const sellFeeRate = 0.0005625;   // 0.075% × 0.75
    // Break-even sell price: revenue × (1 - sellFeeRate) = totalCostIn
    const breakEven = qty > 0 ? totalCostIn / (qty * (1 - sellFeeRate)) : 0;
    // Initial "Sell at price" default = current last price (so the box
    // shows current unrealised net immediately).
    const defaultSell = pos.last_price || pos.entry_price;
    // Net at break-even = 0; show current unrealised net at default.
    function netAtPrice(p) {
      const rev = p * qty;
      const sellFee = rev * sellFeeRate;
      return rev - buyCost - buy_fee_usdt - sellFee;
    }
    function priceForNet(target) {
      return (target + buyCost + buy_fee_usdt) / (qty * (1 - sellFeeRate));
    }
    const currentNet = netAtPrice(pos.last_price);

    const feePartsHtml = parts.length
      ? parts.map(p => `<div class="fee-line">${p.note} = <strong>$${p.usd.toFixed(6)}</strong></div>`).join('')
      : '<div class="fee-line muted">no commission data in trade history</div>';

    posHtml = `
      <div class="card">
        <h2>Current Position (HOLDING)</h2>
        <div class="grid-3">
          <div class="ob-block"><div class="label">Entry $</div><div class="value">${fmtPrice(pos.entry_price)}</div><div class="sub">qty ${pos.qty}</div></div>
          <div class="ob-block"><div class="label">Last $</div><div class="value">${fmtPrice(pos.last_price)}</div><div class="sub">val ${fmtUsd(pos.current_value_usdt)}</div></div>
          <div class="ob-block"><div class="label">P&L (raw)</div><div class="value ${pos.pnl_usdt >= 0 ? 'pos' : 'neg'}">${fmtUsd(pos.pnl_usdt)}</div><div class="sub">${fmtPct(pos.pnl_pct)}</div></div>
        </div>
      </div>

      <div class="card sell-planner">
        <h2>💰 Sell Price Planner</h2>
        <div class="planner-grid">
          <div class="planner-col">
            <div class="planner-stat">
              <span class="label">Buy cost (actual)</span>
              <span class="value">${fmtUsd(buyCost)}</span>
              <span class="sub">${bd ? bd.fills_count + ' fills · avg $' + (bd.matched_avg_price || 0).toFixed(6) : 'from BUY record'}</span>
            </div>
            <div class="planner-stat">
              <span class="label">Buy fees (converted)</span>
              <span class="value">${fmtUsd(buy_fee_usdt)}</span>
              <span class="sub planner-feeparts">${feePartsHtml}</span>
            </div>
            <div class="planner-stat">
              <span class="label">TOTAL cost in</span>
              <span class="value strong">${fmtUsd(totalCostIn)}</span>
              <span class="sub">cost + buy fees</span>
            </div>
            <div class="planner-stat">
              <span class="label">Break-even sell price</span>
              <span class="value strong">${fmtPrice(breakEven)}</span>
              <span class="sub">net = 0 (sell fee ${(sellFeeRate*100).toFixed(4)}% included)</span>
            </div>
            <div class="planner-stat">
              <span class="label">Current unrealised net</span>
              <span class="value ${currentNet >= 0 ? 'pos' : 'neg'}">${fmtUsd(currentNet)}</span>
              <span class="sub">if you sold now @ ${fmtPrice(pos.last_price)}</span>
            </div>
          </div>

          <div class="planner-col">
            <div class="planner-calc">
              <label class="label">Sell at price →</label>
              <input id="plan-price" type="number" step="any" value="${defaultSell}" />
              <div class="planner-result" id="plan-price-result">net = ${fmtUsd(netAtPrice(defaultSell))}</div>
            </div>
            <div class="planner-calc">
              <label class="label">Target NET $ →</label>
              <input id="plan-net" type="number" step="any" value="0.5" />
              <div class="planner-result" id="plan-net-result">place sell @ ${fmtPrice(priceForNet(0.5))}</div>
            </div>
            <div class="planner-presets">
              <span class="label">Quick targets:</span>
              ${[0.10, 0.50, 1.00, 2.50, 5.00, 10.00].map(v => `
                <button class="preset-btn" data-target="${v}">+$${v.toFixed(2)} → ${fmtPrice(priceForNet(v))}</button>
              `).join('')}
            </div>
          </div>
        </div>
        <div class="planner-note">
          Math: revenue = sell × qty · sell fee = revenue × ${(sellFeeRate*100).toFixed(4)}% · NET = revenue − buy cost − buy fees − sell fee
        </div>
      </div>
    `;

    // Bind interactive recalculation after innerHTML is set.
    setTimeout(() => {
      const priceInput = document.getElementById('plan-price');
      const netInput = document.getElementById('plan-net');
      const priceResult = document.getElementById('plan-price-result');
      const netResult = document.getElementById('plan-net-result');
      if (priceInput) priceInput.addEventListener('input', () => {
        const v = parseFloat(priceInput.value);
        if (!isFinite(v) || v <= 0) { priceResult.textContent = '—'; return; }
        const n = netAtPrice(v);
        priceResult.innerHTML = `net = <strong class="${n>=0?'pos':'neg'}">${fmtUsd(n)}</strong>`;
      });
      if (netInput) netInput.addEventListener('input', () => {
        const v = parseFloat(netInput.value);
        if (!isFinite(v)) { netResult.textContent = '—'; return; }
        const sp = priceForNet(v);
        netResult.innerHTML = `place sell @ <strong>${fmtPrice(sp)}</strong>`;
      });
      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const v = parseFloat(btn.getAttribute('data-target'));
          if (netInput) netInput.value = v;
          const sp = priceForNet(v);
          if (netResult) netResult.innerHTML = `place sell @ <strong>${fmtPrice(sp)}</strong>`;
          if (priceInput) {
            priceInput.value = sp;
            priceInput.dispatchEvent(new Event('input'));
          }
        });
      });
    }, 0);
  }

  // Trades
  const trades = p.trades_recent || [];
  const tradesHtml = `
    <div class="card">
      <h2>Recent Trades (last 10)</h2>
      ${trades.length ? `
      <table class="trades-tbl">
        <thead><tr><th>Time</th><th>Side</th><th class="num">Price</th><th class="num">Qty</th><th class="num">Quote</th></tr></thead>
        <tbody>
          ${trades.map(t => `
            <tr>
              <td>${fmtTime(t.time)}</td>
              <td class="${t.side === 'BUY' ? 'side-buy' : 'side-sell'}">${t.side}</td>
              <td class="num">${fmtPrice(t.price)}</td>
              <td class="num">${t.qty}</td>
              <td class="num">${fmtUsd(t.quote)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>` : '<div class="empty">No trades recorded for this coin.</div>'}
    </div>
  `;

  // Header
  const chg24 = m.change_24h_pct;
  const binanceUrl = (window.bnBinanceUrl || ((s)=>'https://www.binance.com/en/trade'))(currentSym);
  const headerHtml = `
    <div class="coin-header">
      <div>
        <div class="coin-name">${currentSym}</div>
        <div class="coin-meta">
          <span>24h vol: <strong>${fmtUsd(m.quote_volume_24h_usdt)}</strong></span>
          <span>24h trades: <strong>${m.trade_count_24h?.toLocaleString() || '—'}</strong></span>
          <span>24h high: <strong>${fmtPrice(m.high_24h)}</strong></span>
          <span>24h low: <strong>${fmtPrice(m.low_24h)}</strong></span>
        </div>
      </div>
      <div style="text-align:right">
        <div class="coin-price">${fmtPrice(m.last_price)}</div>
        <div style="font-size:18px;font-weight:700;margin-top:4px" class="${chg24 >= 0 ? 'pos' : 'neg'}">${fmtPct(chg24)}</div>
        <div style="display:inline-flex;gap:8px;flex-wrap:wrap;margin-top:8px;justify-content:flex-end">
          <a class="bn-binance-link large" href="${binanceUrl}" target="_blank" rel="noopener noreferrer" title="Open ${currentSym} on Binance">🟡 View on Binance →</a>
          <!-- iter127 — sibling Quick Trade button next to the big Binance one.
               iter128 — typographic 'B' mark instead of 🚀 emoji. -->
          <a class="bn-quick-link large" href="/quick-trade.html?sym=${currentSym}" title="Open ${currentSym} in BookNow Quick Trade"><span class="b-mark">B</span> Quick Trade →</a>
        </div>
      </div>
    </div>
  `;

  // iter 102 — Order Flow section (taker buy vs sell, 2h window).
  // Renders as a placeholder; loadOrderFlow() fills it asynchronously
  // so the main page doesn't wait on the extra Binance kline fetch.
  const orderFlowHtml = `
    <section class="card" id="orderflow-card">
      <div class="card-head">
        <h3>📊 Order Flow · <span style="color:var(--muted);font-weight:500">last 2 hours</span></h3>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="of-hours" onchange="loadOrderFlow(currentSym)" style="background:var(--panel-2);color:var(--text);border:1px solid var(--line);padding:3px 8px;border-radius:5px;font-size:11px">
            <option value="1">1h</option>
            <option value="2" selected>2h</option>
            <option value="4">4h</option>
            <option value="8">8h</option>
          </select>
          <span id="of-status" style="font-size:11px;color:var(--muted)">loading…</span>
        </div>
      </div>
      <div id="orderflow-container">
        <div class="empty" style="padding:20px;color:var(--muted);font-size:12px">Loading order flow…</div>
      </div>
    </section>
  `;

  document.getElementById('content').innerHTML = headerHtml + verdictHtml + sgHtml + detectorsHtml + filtersHtml + obHtml + priceActionHtml + orderFlowHtml + posHtml + tradesHtml;
  // Fire-and-forget the order flow load.
  loadOrderFlow(currentSym);
}

async function refresh() {
  if (!currentSym) return;
  document.getElementById('status').textContent = `Loading ${currentSym}…`;
  try {
    const r = await fetch(`/api/coin/${currentSym}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: 'Request failed' }));
      document.getElementById('content').innerHTML = `<div class="card empty">Error: ${err.error || 'request failed'}</div>`;
      document.getElementById('status').textContent = 'Error';
      return;
    }
    const data = await r.json();
    render(data);
    document.getElementById('status').textContent = `${currentSym} — updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="card empty">Error: ${e.message}</div>`;
    document.getElementById('status').textContent = 'Error';
  }
}

// ──────────────────────────────────────────────────────────────────────
// iter 102 — Order Flow renderer.
// Fetches /api/coin/:symbol/orderflow?hours=N and displays a summary
// card + per-minute table colored by taker buy/sell dominance.
// ──────────────────────────────────────────────────────────────────────
function ofIstStamp(ts) {
  if (!ts) return { date: '—', time: '—:—:—' };
  const d = new Date(ts);
  const fmt = new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Asia/Kolkata',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false,
  });
  return fmt.format(d);
}

function ofClassColor(cls, volUsdt) {
  // Stronger intensity for bigger candles.
  const heavy = volUsdt >= 50000;
  const mid   = volUsdt >= 20000;
  if (cls === 'SELLERS') return heavy ? 'rgba(231,76,60,.22)' : mid ? 'rgba(231,76,60,.13)' : 'rgba(231,76,60,.07)';
  if (cls === 'BUYERS')  return heavy ? 'rgba(46,204,113,.22)' : mid ? 'rgba(46,204,113,.13)' : 'rgba(46,204,113,.07)';
  if (cls === 'MIXED')   return 'rgba(241,196,15,.08)';
  return 'transparent';
}

function ofClassChip(cls) {
  if (cls === 'SELLERS') return '<span class="m-chip neg">🔴 SELLERS</span>';
  if (cls === 'BUYERS')  return '<span class="m-chip pos">🟢 BUYERS</span>';
  if (cls === 'MIXED')   return '<span class="m-chip" style="background:rgba(241,196,15,.18);color:#f1c40f">⚖️ MIXED</span>';
  return '<span class="m-chip">— quiet</span>';
}

async function loadOrderFlow(symbol) {
  if (!symbol) return;
  const status = document.getElementById('of-status');
  const container = document.getElementById('orderflow-container');
  if (!container) return;
  const hoursSel = document.getElementById('of-hours');
  const hours = hoursSel ? parseFloat(hoursSel.value) || 2 : 2;

  if (status) status.textContent = 'loading…';
  try {
    // minVolUsdt=500 cuts the noise of zero-volume idle minutes but
    // keeps every meaningful candle visible.
    const r = await fetch(`/api/coin/${symbol}/orderflow?hours=${hours}&minVolUsdt=500`);
    if (!r.ok) {
      container.innerHTML = `<div class="empty" style="padding:20px;color:var(--bad)">Failed to load order flow</div>`;
      if (status) status.textContent = 'error';
      return;
    }
    const data = await r.json();
    container.innerHTML = renderOrderFlow(data);
    if (status) status.textContent = `${data.candles_total} candles · updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    container.innerHTML = `<div class="empty" style="padding:20px;color:var(--bad)">Error: ${e.message}</div>`;
    if (status) status.textContent = 'error';
  }
}

function renderOrderFlow(d) {
  const s = d.summary || {};
  const totVol = s.total_vol_usdt || 0;
  const totBuy = s.total_buy_usdt || 0;
  const totSell = s.total_sell_usdt || 0;
  const buyPct = s.buy_pct_overall || 0;
  const sellPct = 100 - buyPct;
  const dom = s.dominant_side || 'MIXED';
  const domColor = dom === 'SELLERS' ? 'var(--bad)' : dom === 'BUYERS' ? 'var(--good)' : '#f1c40f';
  const domIcon  = dom === 'SELLERS' ? '🔴' : dom === 'BUYERS' ? '🟢' : '⚖️';
  const sym = d.symbol || '';

  // ── Summary card ─────────────────────────────────────────────────
  const summaryHtml = `
    <div class="of-summary">
      <div class="of-stat">
        <div class="of-stat-label">Dominant Side · ${d.hours}h</div>
        <div class="of-stat-value" style="color:${domColor};font-size:22px">${domIcon} ${dom}</div>
        <div class="of-stat-sub">${buyPct.toFixed(1)}% buy · ${sellPct.toFixed(1)}% sell</div>
      </div>
      <div class="of-stat">
        <div class="of-stat-label">Total Flow</div>
        <div class="of-stat-value">${fmtUsd(totVol)}</div>
        <div class="of-stat-sub">${(s.total_trades || 0).toLocaleString()} trades</div>
      </div>
      <div class="of-stat">
        <div class="of-stat-label">Taker BUY</div>
        <div class="of-stat-value pos">${fmtUsd(totBuy)}</div>
        <div class="of-stat-sub">market buyers</div>
      </div>
      <div class="of-stat">
        <div class="of-stat-label">Taker SELL</div>
        <div class="of-stat-value neg">${fmtUsd(totSell)}</div>
        <div class="of-stat-sub">market sellers</div>
      </div>
      <div class="of-stat">
        <div class="of-stat-label">Candle mix</div>
        <div class="of-stat-value" style="font-size:14px">
          <span style="color:var(--bad)">🔴 ${s.seller_dominated_count}</span> ·
          <span style="color:var(--good)">🟢 ${s.buyer_dominated_count}</span> ·
          <span style="color:#f1c40f">⚖️ ${s.mixed_count}</span> ·
          <span style="color:var(--muted)">— ${s.quiet_count}</span>
        </div>
        <div class="of-stat-sub">sellers · buyers · mixed · quiet</div>
      </div>
    </div>
  `;

  // ── Stacked vol bar ──────────────────────────────────────────────
  const buyBarPct  = buyPct.toFixed(1);
  const sellBarPct = sellPct.toFixed(1);
  const barHtml = `
    <div class="of-bar">
      <div class="of-bar-track">
        <div class="of-bar-buy" style="width:${buyBarPct}%" title="Buy ${fmtUsd(totBuy)}">${buyPct >= 8 ? buyBarPct + '%' : ''}</div>
        <div class="of-bar-sell" style="width:${sellBarPct}%" title="Sell ${fmtUsd(totSell)}">${sellPct >= 8 ? sellBarPct + '%' : ''}</div>
      </div>
    </div>
  `;

  // ── Biggest candles highlights ───────────────────────────────────
  let highlightsHtml = '';
  if (s.biggest_dump_candle || s.biggest_buy_candle) {
    const bd = s.biggest_dump_candle, bb = s.biggest_buy_candle;
    highlightsHtml = `<div class="of-highlights">`;
    if (bd) {
      highlightsHtml += `
        <div class="of-highlight neg">
          <div class="of-highlight-title">🔴 Biggest dump candle</div>
          <div class="of-highlight-time">${ofIstStamp(bd.ts)} IST</div>
          <div class="of-highlight-data">${fmtUsd(bd.vol_usdt)} · ${bd.buy_pct}% buy · ${bd.trades} trades</div>
        </div>`;
    }
    if (bb) {
      highlightsHtml += `
        <div class="of-highlight pos">
          <div class="of-highlight-title">🟢 Biggest buy candle</div>
          <div class="of-highlight-time">${ofIstStamp(bb.ts)} IST</div>
          <div class="of-highlight-data">${fmtUsd(bb.vol_usdt)} · ${bb.buy_pct}% buy · ${bb.trades} trades</div>
        </div>`;
    }
    highlightsHtml += `</div>`;
  }

  // ── Per-candle table ─────────────────────────────────────────────
  const rows = (d.candles || []).slice(0, 200).map(c => {
    const bg = ofClassColor(c.classification, c.vol_usdt);
    const chgCls = c.chg_pct >= 0 ? 'pos' : 'neg';
    const chgSign = c.chg_pct >= 0 ? '+' : '';
    return `
      <tr class="of-row" style="background:${bg}">
        <td class="of-time">${ofIstStamp(c.ts)}</td>
        <td class="of-close">${fmtPrice(c.close)}</td>
        <td class="of-chg ${chgCls}">${chgSign}${c.chg_pct.toFixed(3)}%</td>
        <td class="of-vol">${fmtUsd(c.vol_usdt)}</td>
        <td class="of-buy pos">${fmtUsd(c.buy_usdt)}</td>
        <td class="of-sell neg">${fmtUsd(c.sell_usdt)}</td>
        <td class="of-pct">${c.buy_pct.toFixed(1)}%</td>
        <td class="of-class">${ofClassChip(c.classification)}</td>
        <td class="of-trades">${c.trades}</td>
        <td class="of-interpret" style="color:var(--muted);font-size:11px">${c.interpretation}</td>
      </tr>`;
  }).join('');

  const tableHtml = rows ? `
    <div class="of-table-wrap">
      <table class="of-table">
        <thead>
          <tr>
            <th>IST</th>
            <th>Close</th>
            <th>Δ%</th>
            <th>Vol</th>
            <th>BUY $</th>
            <th>SELL $</th>
            <th>BUY %</th>
            <th>Class</th>
            <th>Trades</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  ` : `<div class="empty" style="padding:20px">No candles in window.</div>`;

  return summaryHtml + barHtml + highlightsHtml + tableHtml;
}

function loadSymbol() {
  let sym = document.getElementById('search-input').value.trim().toUpperCase();
  if (!sym) return;
  if (!sym.endsWith('USDT')) sym = sym + 'USDT';
  currentSym = sym;
  document.getElementById('refresh-btn').disabled = false;
  // Update URL
  const url = new URL(window.location);
  url.searchParams.set('sym', sym);
  window.history.replaceState({}, '', url);
  refresh();
}

// Allow Enter key
document.getElementById('search-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') loadSymbol();
});

// Auto-load from URL param
const urlSym = new URL(window.location).searchParams.get('sym');
if (urlSym) {
  document.getElementById('search-input').value = urlSym;
  currentSym = urlSym.toUpperCase();

  setInterval(renderAlertsHome, 5000);
