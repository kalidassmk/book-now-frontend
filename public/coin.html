// ─────────────────────────────────────────────────────────────
// Alerts home view — categorized, color-coded, clickable rows.
// Sources: /api/alerts/feed (includes pump_rider, early_pump,
// trade, vsp, lmc, ccp, weak_pump).
// ─────────────────────────────────────────────────────────────
function categorize(ev) {
  if (ev.kind === 'trade') return 'mytrades';  // iter95 — re-route trades into dedicated bucket
  if (ev.kind === 'weak_pump') return 'weak';
  // iter 103 — INSTANT_PUMP always goes into Strong bucket (highest priority)
  if (ev.kind === 'instant_pump') return 'strong';
  // iter 88 — scalper signal-only events
  if (ev.kind === 'fast_scalper' || ev.kind === 'virtual_scalper') return 'watch';
  if (ev.kind === 'pump_rider') {
    const t = (ev.tier || '').toUpperCase();
    return (t === 'STRONG' || t === 'NORMAL') ? 'strong' : 'watch';
  }
  if (ev.kind === 'early_pump') return (+ev.score || 0) >= 80 ? 'strong' : 'watch';
  if (ev.kind === 'vsp') {
    const l = (ev.label || '').toUpperCase();
    if (l.startsWith('BIG_PUMP')) return 'strong';
    if (l.includes('DUMP')) return 'dump';
    return 'watch';
  }
  if (ev.kind === 'lmc') {
    const l = (ev.label || '').toUpperCase();
    if (l === 'EXPLOSIVE_PUMP') return 'strong';
    if (l === 'FLASH_DUMP') return 'dump';   // iter93
    if (l.includes('DUMP')) return 'dump';
    return 'watch';
  }
  if (ev.kind === 'ccp') {
    const l = (ev.label || '').toUpperCase();
    if (l === 'CALM_REVERSAL_UP') return 'strong';
    if (l.includes('BREAKDOWN_RISK')) return 'dump';
    return 'watch';
  }
  return 'watch';
}

// iter 85 — structured metric chips (proper layout, no floating text)
function chip(text, cls) { return `<span class="m-chip ${cls||''}">${text}</span>`; }
function pctChip(v, suffix) {
  if (v == null) return '';
  const cls = v >= 0 ? 'pos' : 'neg';
  return chip(`${v >= 0 ? '+' : ''}${(+v).toFixed(2)}%${suffix||''}`, cls);
}
// iter 90 — universal signal-price chip for every detector row.
function priceChip(p) {
  if (p == null || isNaN(+p)) return '';
  const v = +p;
  // Use enough precision for sub-cent coins like PEPE/WHY.
  const text = v >= 1 ? '$' + v.toFixed(4) : '$' + v.toPrecision(4);
  return chip(text, 'score');
}

function describe(ev) {
  if (ev.kind === 'trade') {
    // iter95 — distinguish MANUAL (operator on Binance UI) from BOT trades.
    const a = (ev.action || '').toUpperCase();
    const lbl = (ev.rule_label || '').toUpperCase();
    const isManual = lbl === 'MANUAL';
    let ic;
    if (a === 'BUY' || a === 'FILLED') {
      ic = isManual ? '👤🛒' : '🤖🛒';
    } else if (a === 'SELL') {
      ic = isManual ? '👤💰' : (ev.realised_net >= 0 ? '💰' : '🛑');
    } else {
      ic = '📝';
    }
    const chips = [];
    if (a) chips.push(chip(a, isManual ? 'score' : ''));
    if (isManual) chips.push(chip('MANUAL', 'score'));
    if (ev.price != null) chips.push(priceChip(ev.price));
    if (ev.realised_net != null) {
      const cls = ev.realised_net >= 0 ? 'pos' : 'neg';
      chips.push(chip(`${ev.realised_net >= 0 ? '+' : ''}$${(+ev.realised_net).toFixed(2)}`, cls));
    }
    return { ic, source: isManual ? 'Your Trade' : 'Bot Trade', chips };
  }
  if (ev.kind === 'weak_pump') {
    return { ic: '⚠️', source: 'Weak Pump · Rejected', chips: [chip((ev.reason || '').slice(0, 80), 'neg')] };
  }
  // iter 88 — scalper would-have-bought signal
  if (ev.kind === 'fast_scalper' || ev.kind === 'virtual_scalper') {
    const label = ev.kind === 'fast_scalper' ? 'Fast Scalper' : 'Virtual Scalper';
    const chips = [chip('WOULD BUY', 'score')];
    if (ev.signal_price != null) chips.push(chip('@ $' + (+ev.signal_price).toPrecision(4)));
    if (ev.features && typeof ev.features === 'object') {
      const f = ev.features;
      if (f.vol_surge_ratio != null) chips.push(chip((+f.vol_surge_ratio).toFixed(1) + '× vol', 'vol'));
      if (f.pre_vol_baseline_usdt) chips.push(chip('base $' + Math.round(+f.pre_vol_baseline_usdt).toLocaleString(), ''));
    }
    if (ev.source) chips.push(chip(ev.source));
    return { ic: ev.kind === 'fast_scalper' ? '⚡' : '🧪', source: label, chips };
  }
  if (ev.kind === 'pump_rider') {
    const t = (ev.tier || '').toUpperCase();
    const ic = ({STRONG:'🔥', NORMAL:'🚀', EARLY:'👀', MEGA:'⚠️'})[t] || '⚡';
    const chips = [];
    if (t) chips.push(chip(t));
    if (ev.price != null) chips.push(priceChip(ev.price));   // iter90
    if (ev.chg_5m != null) chips.push(pctChip(+ev.chg_5m, '/5m'));
    if (ev.vol_surge_5m != null) chips.push(chip(`${(+ev.vol_surge_5m).toFixed(1)}× vol`, 'vol'));
    return { ic, source: 'PumpRider', chips };
  }
  if (ev.kind === 'early_pump') {
    const s = +ev.score || 0;
    const chips = [chip(`score ${s}`, 'score')];
    if (ev.price != null) chips.push(priceChip(ev.price));   // iter90
    if (ev.change_24h_pct != null) chips.push(pctChip(+ev.change_24h_pct, ' 24h'));
    return { ic: s >= 80 ? '🚀' : '👀', source: 'Early Pump', chips };
  }
  if (ev.kind === 'vsp') {
    const l = ev.label || '';
    const ic = l.includes('BIG_PUMP') ? '🔥' : l.includes('BIG_DUMP') ? '🔴' : l.includes('MODERATE') ? '⚡' : '👀';
    const chips = [chip(l, l.includes('DUMP') ? 'neg' : (l.includes('PUMP') ? 'pos' : ''))];
    if (ev.price != null) chips.push(priceChip(ev.price));   // iter90
    if (ev.confidence != null) chips.push(chip(`conf ${ev.confidence}`, 'score'));
    return { ic, source: 'VSP', chips };
  }
  if (ev.kind === 'lmc') {
    const l = ev.label || '';
    // iter93 — FLASH_DUMP gets a thunderbolt icon to highlight 10-30s detection
    const ic = l === 'FLASH_DUMP' ? '⚡🔴'
             : l === 'EXPLOSIVE_PUMP' ? '💎'
             : l.includes('DUMP') ? '💎🔴'
             : '💎';
    const chips = [chip(l, l.includes('DUMP') ? 'neg' : (l.includes('PUMP') ? 'pos' : ''))];
    if (ev.price != null) chips.push(priceChip(ev.price));   // iter90
    if (ev.score != null) chips.push(chip(`score ${ev.score}`, 'score'));
    // iter93 — flash-dump path chips (shown when the flash gate fired)
    if (ev.flash_window_s != null && +ev.flash_window_s > 0) {
      chips.push(chip(`${(+ev.flash_price_chg_pct).toFixed(2)}% in ${(+ev.flash_window_s).toFixed(0)}s`, 'neg'));
    }
    if (ev.flash_vol_delta_usd != null && +ev.flash_vol_delta_usd > 0) {
      chips.push(chip(`+$${Math.round(+ev.flash_vol_delta_usd).toLocaleString()} vol`, 'vol'));
    }
    // iter92 — fast-path 5m surge chips
    if (ev.surge_5m != null && +ev.surge_5m > 0) {
      chips.push(chip(`${(+ev.surge_5m).toFixed(1)}× vol/5m`, 'vol'));
    }
    if (ev.chg_5m_pct != null && Math.abs(+ev.chg_5m_pct) > 0) {
      chips.push(pctChip(+ev.chg_5m_pct, '/5m'));
    }
    if (ev.trigger_source && ev.trigger_source !== '24h') {
      chips.push(chip('⚡' + ev.trigger_source, 'score'));
    }
    if (ev.vol_surge_x != null) chips.push(chip(`${(+ev.vol_surge_x).toFixed(1)}× vol/24h`, 'vol'));
    return { ic, source: 'LMC', chips };
  }
  if (ev.kind === 'ccp') {
    const l = ev.label || '';
    const ic = l === 'CALM_REVERSAL_UP' ? '🌊' : l.includes('BREAKDOWN') ? '🌊🔴' : '🌊';
    const chips = [chip(l, l.includes('BREAKDOWN') ? 'neg' : (l.includes('REVERSAL') ? 'pos' : ''))];
    if (ev.price != null) chips.push(priceChip(ev.price));   // iter90
    if (ev.score != null) chips.push(chip(`score ${ev.score}`, 'score'));
    return { ic, source: 'CCP', chips };
  }
  // iter 103 — INSTANT_PUMP (sub-second coordinated pump pattern)
  if (ev.kind === 'instant_pump') {
    const chips = [chip('INSTANT PUMP', 'pos')];
    if (ev.price != null) chips.push(priceChip(ev.price));
    if (ev.price_chg_pct != null) {
      chips.push(chip('+' + (+ev.price_chg_pct).toFixed(2) + '% in ' + (+ev.window_s).toFixed(1) + 's', 'pos'));
    }
    if (ev.chg_per_sec != null && +ev.chg_per_sec >= 0.5) {
      chips.push(chip((+ev.chg_per_sec).toFixed(2) + '%/sec', 'pos'));
    }
    if (ev.vol_delta_usd != null && +ev.vol_delta_usd > 0) {
      chips.push(chip('+$' + Math.round(+ev.vol_delta_usd).toLocaleString() + ' vol', 'vol'));
    }
    if (ev.score != null) chips.push(chip('score ' + ev.score, 'score'));
    return { ic: '💥', source: 'Instant Pump', chips };
  }
  return { ic: '•', source: ev.kind || 'event', chips: [] };
}

// iter121 — browser pop-up notifications for new Top-5 BUY signals.
// Permission must be requested from a user gesture, so an in-panel
// toggle button drives the flow.  We persist the on/off choice in
// localStorage and use a sessionStorage watermark (ts of the newest
// signal we've already notified about) so a fresh tab doesn't fire
// pop-ups for already-existing entries.
const NOTIF_KEY = 'bn_top5_notif_on';
const NOTIF_TS_KEY = 'bn_top5_notif_ts';

function notifSupported(){ return typeof Notification !== 'undefined'; }
function notifWanted(){ return localStorage.getItem(NOTIF_KEY) === '1'; }
function notifLive(){ return notifSupported() && notifWanted() && Notification.permission === 'granted'; }

async function toggleNotif(){
  if (!notifSupported()){
    alert('Your browser does not support pop-up notifications.');
    return;
  }
  if (notifLive()){
    localStorage.removeItem(NOTIF_KEY);
    updateNotifButton();
    return;
  }
  if (Notification.permission === 'denied'){
    alert('Notifications are blocked for this site in your browser settings. Re-enable them there, then try again.');
    return;
  }
  let perm = Notification.permission;
  if (perm !== 'granted') perm = await Notification.requestPermission();
  if (perm === 'granted'){
    localStorage.setItem(NOTIF_KEY, '1');
    // Anchor watermark to NOW so existing entries don't fire pop-ups.
    if (!sessionStorage.getItem(NOTIF_TS_KEY)){
      sessionStorage.setItem(NOTIF_TS_KEY, String(Date.now()));
    }
    updateNotifButton();
    try {
      const n = new Notification('🔔 BookNow alerts enabled', {
        body: 'You will be pinged when new Top-5 BUY signals appear.',
        tag: 'bn-notif-enable',
      });
      setTimeout(() => { try { n.close(); } catch(_){} }, 5000);
    } catch(_){}
    // iter123 — initialise the WebAudio context inside the user gesture
    // so the first real ping can play (browsers gate ctx on a gesture).
    try { bnPlayPing(); } catch(_){}
  } else {
    updateNotifButton();
  }
}

function updateNotifButton(){
  const btn = document.getElementById('notifBtn');
  if (!btn) return;
  if (!notifSupported()){
    btn.textContent = '🔕 Pop-ups unsupported';
    btn.disabled = true;
    return;
  }
  if (notifLive()){
    btn.textContent = '🔔 Pop-ups ON';
    btn.title = 'Click to disable browser pop-ups for new BUY signals';
    btn.classList.add('on');
  } else {
    const blocked = Notification.permission === 'denied';
    btn.textContent = blocked ? '🚫 Pop-ups blocked' : '🔕 Enable pop-ups';
    btn.title = blocked
      ? 'Notifications are blocked in browser settings'
      : 'Click to get a browser pop-up when a new BUY signal appears';
    btn.classList.remove('on');
  }
}

// iter123 — in-tab cues (audio ping + title flash) that work even if
// the browser has notifications blocked or the operator hasn't yet
// clicked '🔕 Enable pop-ups'.  WebAudio context is created lazily
// (browsers gate it on a user gesture, which clicking the toggle
// provides; otherwise the first ping silently fails and the title
// flash still works).
let _bnAudioCtx = null;
function bnPlayPing(){
  try {
    if (!_bnAudioCtx) _bnAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _bnAudioCtx;
    const now = ctx.currentTime;
    // Two-tone chirp: short rising "ding"
    [
      { freq: 880,  start: 0.00, dur: 0.10 },
      { freq: 1320, start: 0.10, dur: 0.14 },
    ].forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = t.freq;
      gain.gain.setValueAtTime(0.0001, now + t.start);
      gain.gain.exponentialRampToValueAtTime(0.18, now + t.start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + t.start + t.dur);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + t.start);
      osc.stop(now + t.start + t.dur + 0.02);
    });
  } catch(_){}
}

let _bnOriginalTitle = null;
let _bnTitleFlashTimer = null;
let _bnTitleFlashStep = 0;
function bnFlashTitle(label){
  if (_bnOriginalTitle == null) _bnOriginalTitle = document.title;
  if (_bnTitleFlashTimer) clearInterval(_bnTitleFlashTimer);
  _bnTitleFlashStep = 0;
  const flashLabel = '🔥 ' + label;
  const tick = () => {
    document.title = (_bnTitleFlashStep % 2 === 0) ? flashLabel : _bnOriginalTitle;
    _bnTitleFlashStep++;
    if (_bnTitleFlashStep >= 16){
      clearInterval(_bnTitleFlashTimer);
      _bnTitleFlashTimer = null;
      document.title = _bnOriginalTitle;
    }
  };
  tick();
  _bnTitleFlashTimer = setInterval(tick, 750);
  // Stop flashing once the operator focuses the tab again.
  const stopOnFocus = () => {
    if (_bnTitleFlashTimer){ clearInterval(_bnTitleFlashTimer); _bnTitleFlashTimer = null; }
    document.title = _bnOriginalTitle || document.title;
    window.removeEventListener('focus', stopOnFocus);
  };
  window.addEventListener('focus', stopOnFocus, { once: true });
}

function notifyNewBuys(topBuys){
  if (!topBuys || !topBuys.length) return;
  // iter123 — watermark is shared by ALL in-tab cues (audio + title
  // + pop-up).  If pop-ups are off but audio/title are on the page,
  // we still want each new signal to fire exactly once.
  const watermark = parseInt(sessionStorage.getItem(NOTIF_TS_KEY) || '0', 10);
  // On the FIRST tick after page load, if no watermark exists, anchor
  // it to the newest current entry so we don't ping for back-history.
  if (!watermark){
    const newestTs = topBuys.reduce((m, e) => Math.max(m, e.ts || 0), 0);
    if (newestTs) sessionStorage.setItem(NOTIF_TS_KEY, String(newestTs));
    return;
  }
  const fresh = topBuys
    .filter(e => (e.ts || 0) > watermark)
    .sort((a, b) => (a.ts || 0) - (b.ts || 0))
    .slice(-3);  // cap so a burst of 5 doesn't fire 5 pop-ups
  if (!fresh.length) return;

  // In-tab cues — fire ONCE per tick regardless of how many fresh
  // entries arrived.  Always fires (no permission needed).
  try { bnPlayPing(); } catch(_){}
  try { bnFlashTitle(`${fresh.length} new BUY signal${fresh.length === 1 ? '' : 's'}`); } catch(_){}

  // Browser pop-up — gated on the permission toggle.  iter123 drops
  // the focus-skip so the operator sees the pop-up even while the
  // BookNow tab is in front (Chrome handles that gracefully).
  if (notifLive()){
    for (const ev of fresh){
      try {
        const sym = ev.symbol || '?';
        const detector = (ev.kind || 'signal').toUpperCase().replace(/_/g, ' ');
        const priceStr = (ev.signal_price != null ? ev.signal_price
                        : ev.price != null ? ev.price : null);
        const priceTail = priceStr != null ? ` @ $${(+priceStr).toPrecision(6)}` : '';
        const n = new Notification(`🔥 ${sym} — ${detector}`, {
          body: `Strong BUY signal${priceTail}. Click to open dashboard.`,
          tag: `bn-buy-${sym}-${ev.kind}-${ev.ts}`,  // de-dup if two ticks race
          renotify: false,
        });
        n.onclick = () => { try { window.focus(); } catch(_){} n.close(); };
        setTimeout(() => { try { n.close(); } catch(_){} }, 12000);
      } catch(_){}
    }
  }

  sessionStorage.setItem(NOTIF_TS_KEY, String(fresh[fresh.length - 1].ts));
}

async function renderAlertsHome() {
  if (currentSym) return;  // user has loaded a coin — don't overwrite
  try {
    // iter89 — bump limit so VSP/LMC/CCP/Scalper events don't get pushed
    // out by hundreds of recent PumpRider events.
    const r = await fetch('/api/alerts/feed?since=0&limit=300');
    if (!r.ok) {
      document.getElementById('content').innerHTML = `<div class="card empty">Couldn't load alerts (HTTP ${r.status}).</div>`;
      return;
    }
    const d = await r.json();
    const events = (d.events || []).sort((a, b) => (b.ts || 0) - (a.ts || 0));
    const buckets = { mytrades: [], strong: [], watch: [], weak: [], dump: [] };
    for (const ev of events) buckets[categorize(ev)].push(ev);

    // iter 86 — compute per-symbol consensus: how many distinct
    // detectors fired on each symbol in the last 30 min.  Helps the
    // operator instantly see "agreement" between algorithms.
    const consensus = {};  // symbol → Set of kinds
    const RECENT_MS = 30 * 60 * 1000;
    const nowMs = Date.now();
    for (const ev of events) {
      if (!ev.symbol || nowMs - (ev.ts || 0) > RECENT_MS) continue;
      if (ev.kind === 'trade' || ev.kind === 'weak_pump') continue;  // exclude trade/skip events
      (consensus[ev.symbol] = consensus[ev.symbol] || new Set()).add(ev.kind);
    }
    // The 5 signal detectors: pump_rider, early_pump, vsp, lmc, ccp
    const TOTAL_DETECTORS = 5;
    function consensusBadgeHtml(sym) {
      const set = consensus[sym];
      if (!set || set.size < 2) return '';
      const n = set.size;
      const cls = n >= 4 ? 'pos' : n === 3 ? 'score' : '';
      return `<span class="m-chip ${cls}" title="${n} of ${TOTAL_DETECTORS} detectors agree (last 30min): ${[...set].join(', ')}">🎯 ${n}/${TOTAL_DETECTORS}</span>`;
    }

    // iter 91 — operator does not want bot-trade events on this view
    // anymore (they're tracked elsewhere) and wants a prominent
    // "TOP 5 LATEST BUY SIGNALS" panel at the very top.
    const sections = [
      // iter95 — "Your Trades" pinned at the top: every executionReport
      // fill from your Binance UI activity shows here (BUY then SELL).
      { key: 'mytrades', title: '👤 Your Trades',                desc: 'Your manual buys & sells on Binance (auto-tracked)' },
      { key: 'strong', title: '🔥 Strong Signals',              desc: 'High-confidence BUY candidates' },
      { key: 'watch',  title: '👀 Watch List',                  desc: 'Early signals, lower confidence' },
      { key: 'weak',   title: '⚠️ Weak Pumps (Rejected)',        desc: 'Price↑ + Vol↓ — bot skipped these' },
      { key: 'dump',   title: '🔴 Dump Risk',                    desc: 'Down signals — avoid entry' },
    ];

    function ageStr(ts) {
      const sec = Math.max(0, (Date.now() - ts) / 1000);
      if (sec < 60)   return `${sec.toFixed(0)}s`;
      if (sec < 3600) return `${(sec/60).toFixed(0)}m`;
      if (sec < 86400) return `${(sec/3600).toFixed(1)}h`;
      return `${(sec/86400).toFixed(0)}d`;
    }
    // iter 90 — exact IST timestamp (YYYY-MM-DD HH:MM:SS) for each
    // signal event so the operator can correlate to Binance charts.
    function istStamp(ts) {
      if (!ts) return { date: '—', time: '—:—:—' };
      const d = new Date(ts);
      const fmt = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Asia/Kolkata',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false,
      });
      const parts = Object.fromEntries(fmt.formatToParts(d).map(p => [p.type, p.value]));
      return {
        date: `${parts.year}-${parts.month}-${parts.day}`,
        time: `${parts.hour}:${parts.minute}:${parts.second}`,
      };
    }

    let html = `
      <div class="alerts-hero">
        <h2>🚨 Live Alerts Dashboard</h2>
        <p class="sub">Categorized signals from all 5 detectors + weak-pump rejections. Click any symbol to deep-dive.</p>
        <div class="chips">
          ${sections.map(s => `<span class="chip">${s.title.split(' ')[0]} <span class="num">${buckets[s.key].length}</span></span>`).join('')}
          <span class="meta-right">${events.length} total · updated ${new Date().toLocaleTimeString()}</span>
        </div>
      </div>
    `;

    // iter89 — within each section, sub-group by detector kind so
    // VSP / LMC / CCP / FastScalper / VirtualScalper each get their
    // own row block instead of being drowned by the much-more-frequent
    // PumpRider events.  Each kind shows up to PER_KIND_CAP events.
    const KIND_LABELS = {
      instant_pump:    '💥 Instant Pump (iter103)',
      pump_rider:      '🚀 PumpRider',
      early_pump:      '👀 Early Pump',
      vsp:             '⚡ Volume Spike (VSP)',
      lmc:             '💎 Low MCap (LMC)',
      ccp:             '🌊 Calm Consolidation (CCP)',
      fast_scalper:    '⚡ Fast Scalper',
      virtual_scalper: '🧪 Virtual Scalper',
      trade:           '👤 Your Manual Trade',
      weak_pump:       '⚠️ Weak Pump',
    };
    // iter 103 — INSTANT_PUMP rendered FIRST (highest priority signal).
    const KIND_RENDER_ORDER = [
      'instant_pump',
      'fast_scalper', 'virtual_scalper',
      'vsp', 'lmc', 'ccp',
      'early_pump', 'pump_rider',
      'trade', 'weak_pump',
    ];
    const PER_KIND_CAP = 10;

    function renderRow(ev) {
      const d = describe(ev);
      const bz = (window.bnBinanceLinkHtml || (()=>''))(ev.symbol, { compact: true });
      const cb = consensusBadgeHtml(ev.symbol);
      return `
        <div class="alert-row" role="link" tabindex="0" onclick="if(event.target.closest('.bn-binance-link'))return;location.href='/coin.html?sym=${ev.symbol}'">
          <span class="a-ic">${d.ic}</span>
          <span class="a-sym">${ev.symbol}</span>
          <span class="a-source">${d.source}</span>
          <span class="a-metrics">${(d.chips || []).join('')}${cb}</span>
          ${bz}
          <span class="a-when" title="${new Date(ev.ts).toISOString()}">
            <span class="a-time">${istStamp(ev.ts).time}</span>
            <span class="a-date">${istStamp(ev.ts).date} IST</span>
            <span class="a-ago">${ageStr(ev.ts)} ago</span>
          </span>
        </div>
      `;
    }

    function renderSectionBody(items) {
      // Group by kind
      const groups = {};
      for (const ev of items) (groups[ev.kind] = groups[ev.kind] || []).push(ev);
      const ordered = [
        ...KIND_RENDER_ORDER.filter(k => groups[k]),
        ...Object.keys(groups).filter(k => !KIND_RENDER_ORDER.includes(k)),
      ];
      if (!ordered.length) return '';
      let out = '';
      for (const kind of ordered) {
        const arr = groups[kind].sort((a, b) => (b.ts || 0) - (a.ts || 0));
        const shown = arr.slice(0, PER_KIND_CAP);
        const label = KIND_LABELS[kind] || kind;
        out += `<div class="sub-head"><span class="sub-title">${label}</span><span class="sub-count">${arr.length}</span></div>`;
        out += shown.map(renderRow).join('');
        if (arr.length > PER_KIND_CAP) {
          out += `<div class="sec-more">+ ${arr.length - PER_KIND_CAP} more ${label}</div>`;
        }
      }
      return out;
    }

    // iter 91 — pinned "TOP 5 LATEST BUY SIGNALS" panel at top.
    // Pulls the 5 most recent events from the Strong bucket (high-
    // confidence BUY candidates) so the operator can act fast.
    {
      const topBuys = (buckets.strong || [])
        .slice()
        .sort((a, b) => (b.ts || 0) - (a.ts || 0))
        .slice(0, 5);
      // iter121 — fire browser pop-up for any new entries past the
      // watermark.  Skips silently when notifications are disabled.
      notifyNewBuys(topBuys);
      // iter121 — toggle button HTML (same markup in both branches so
      // the operator can enable/disable pop-ups even when the list is
      // currently empty).
      const notifBtnHtml = `<button id="notifBtn" class="notif-toggle" onclick="toggleNotif()" type="button">🔕 Enable pop-ups</button>`;
      if (topBuys.length) {
        html += `
          <section class="alerts-section s-top5">
            <div class="sec-head">
              <div>
                <span class="sec-title">🎯 Top 5 Latest Buy Signals</span>
                <span class="sec-desc">Most recent high-confidence BUY candidates — review &amp; manually execute</span>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                ${notifBtnHtml}
                <span class="sec-count">${topBuys.length} latest</span>
              </div>
            </div>
            <div class="sec-rows">
              ${topBuys.map(renderRow).join('')}
            </div>
          </section>
        `;
      } else {
        html += `
          <section class="alerts-section s-top5">
            <div class="sec-head">
              <div>
                <span class="sec-title">🎯 Top 5 Latest Buy Signals</span>
                <span class="sec-desc">No strong BUY signals in the current window — check Watch List below</span>
              </div>
              <div>${notifBtnHtml}</div>
            </div>
          </section>
        `;
      }
    }

    for (const s of sections) {
      const items = buckets[s.key];
      if (!items.length) continue;
      const cls = 's-' + s.key;
      html += `
        <section class="alerts-section ${cls}">
          <div class="sec-head">
            <div>
              <span class="sec-title">${s.title}</span>
              <span class="sec-desc">${s.desc}</span>
            </div>
            <span class="sec-count">${items.length} ${items.length === 1 ? 'event' : 'events'}</span>
          </div>
          <div class="sec-rows">
            ${renderSectionBody(items)}
          </div>
        </section>
      `;
    }

    if (events.length === 0) {
      html += `<div class="card empty">No alerts yet. Try again in a few seconds.</div>`;
    }

    html += `
      <div style="text-align:center;color:var(--muted);font-size:11px;padding:8px">
        Refreshing every 5s · Search a symbol above to deep-dive into any coin
      </div>
    `;

    document.getElementById('content').innerHTML = html;
    // iter121 — re-sync the toggle's label/colour after every render
    // (the button HTML is freshly injected each tick).
    updateNotifButton();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="card empty">Error loading alerts: ${e.message}</div>`;
  }
}
</script>
