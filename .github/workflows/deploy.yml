name: Build and Deploy

# ─────────────────────────────────────────────────────────────────────────
# Build the dashboard image, push to GHCR, then deploy to Hetzner.
#
# The deploy step authenticates to GHCR before pulling — without it,
# `docker compose pull` returns "denied", but docker-compose silently
# falls back to the cached image and `up -d` claims success. CI ends up
# green while the new image never actually lands on the box.
# Add: login + `--no-cache` on the compose pull + explicit recreate so
# the new image always replaces whatever's running.
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SERVICE_NAME: frontend

jobs:

  # ─────────────────────────────────────────────────────────────────────
  # 1. Build + push to GHCR. Unchanged.
  # ─────────────────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────
  # 2. SSH to Hetzner, authenticate to GHCR, pull, recreate.
  #
  # Failure modes the new flow guards against:
  #   * `docker compose pull` returns "denied" → step exits 0 anyway →
  #     deploy looks green but old image stays. Mitigation: explicit
  #     `docker login` before pull, and `set -euo pipefail` so a failed
  #     pull short-circuits the rest.
  #   * `docker compose up -d frontend` is a no-op if pull found the
  #     image already locally. Mitigation: --force-recreate so the
  #     container always restarts with whatever's now tagged :latest.
  # ─────────────────────────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /opt/booknow

            # Authenticate to GHCR with the workflow's own short-lived
            # GITHUB_TOKEN. Without this, the pull silently fails with
            # "denied" and docker compose falls back to the cached
            # image (the bug that left frontend 24h stale after a
            # successful "deploy").
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Pull explicitly (not via compose pull) so a 4xx surfaces
            # with a non-zero exit code under set -e.
            docker pull ghcr.io/kalidassmk/book-now-frontend:latest

            # Recreate the container so the new :latest tag actually
            # replaces the running one. Without --force-recreate, if
            # docker decides the spec hasn't changed it leaves the old
            # container in place even after a fresh pull.
            docker compose up -d --force-recreate ${{ env.SERVICE_NAME }}

            # Sanity verification — capture the new image digest so the
            # workflow log shows the rollout actually flipped.
            echo "── deployed image ──"
            docker inspect --format '{{.Config.Image}}@{{index .Image 0}}' booknow-frontend 2>/dev/null \
              || docker compose ps ${{ env.SERVICE_NAME }}

            # Tidy.
            docker image prune -f
